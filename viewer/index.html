<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>garden</title>
<style>
  :root{
    --bg:#141b12; --ink:#e6d9ae; --ink-dim:#9a8f6b;
    --card:#1d2718; --edge:#33422a; --accent:#9ccb72;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.55 ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
  .wrap{max-width:560px;margin:0 auto;padding:28px 16px 64px}
  header h1{font-size:15px;font-weight:600;letter-spacing:.45em;
    text-transform:lowercase;margin:0 0 4px}
  header p{margin:0;color:var(--ink-dim);font-size:12px;letter-spacing:.08em}
  #plot-canvas{display:block;width:100%;image-rendering:pixelated;
    margin:22px 0 10px;border-radius:2px;outline:none;cursor:pointer}
  #plot-canvas:focus-visible{box-shadow:0 0 0 2px var(--accent)}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:6px 0 18px;
    color:var(--ink-dim);font-size:11px;letter-spacing:.06em}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend canvas{image-rendering:pixelated;width:16px;height:16px}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:4px;
    padding:14px 16px;min-height:96px}
  .card .id{color:var(--accent);letter-spacing:.2em;font-size:11px;
    text-transform:uppercase}
  .card h2{margin:4px 0 6px;font-size:15px;font-weight:600}
  .card .meta{color:var(--ink-dim);font-size:12px;margin:0 0 8px}
  .card .note{margin:0;font-size:13px}
  .card .links{margin:10px 0 0;font-size:12px;letter-spacing:.04em}
  .card .links a{color:var(--accent);text-decoration:none;margin-right:14px}
  .card .links a:hover{text-decoration:underline}
  .hint{color:var(--ink-dim);font-size:11px;margin-top:14px;letter-spacing:.05em}
  .feedback{margin-top:12px;border-top:1px solid var(--edge);padding-top:10px}
  .feedback textarea{display:block;width:100%;background:var(--bg);color:var(--ink);
    border:1px solid var(--edge);border-radius:3px;font:inherit;font-size:12px;
    padding:6px 8px;resize:vertical;min-height:40px}
  .feedback textarea:focus{outline:none;border-color:var(--accent)}
  .feedback button{margin-top:6px;background:transparent;color:var(--accent);
    border:1px solid var(--edge);border-radius:3px;font:inherit;font-size:11px;
    letter-spacing:.08em;padding:4px 12px;cursor:pointer}
  .feedback button:hover{background:var(--accent);color:var(--bg)}
  .feedback .fb-hint{color:var(--ink-dim);font-size:10px;margin:5px 0 0;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>garden</h1>
    <p id="status">loading…</p>
  </header>

  <canvas id="plot-canvas" tabindex="0"
    aria-label="Garden plot. Use arrow keys to move between plots."></canvas>

  <div class="legend" id="legend"></div>

  <div class="card" id="card">
    <span class="id">&nbsp;</span>
    <h2>tap a plot</h2>
    <p class="meta">each square is a plot. plants grow as work matures.</p>
    <p class="note"></p>
    <p class="links"></p>
    <div class="feedback" id="feedback" hidden>
      <textarea id="fb-text" rows="2"
        placeholder="leave a note for the gardener…"></textarea>
      <button id="fb-send" type="button">send to the gardener</button>
      <p class="fb-hint">opens a prefilled github issue — the gardener reads
        these at the start of every visit.</p>
    </div>
  </div>

  <p class="hint">soil → seed → sprout → growing → bloom → gone to seed.
  plants brown when untended for 3 days.</p>
</div>

<script>
'use strict';

/* ---------- palette ---------- */
const PAL = {
  '.': null,
  'D': '#57381f',  // tilled furrow
  'd': '#6b4830',  // soil
  'm': '#7d5638',  // soil light / mound
  's': '#4c6b32',  // stem dark
  'g': '#3e6b2f',  // leaf dark
  'G': '#6fa84d',  // leaf mid
  'L': '#9ccb72',  // leaf light
  'f': '#e08bb0',  // petal
  'F': '#e8c15a',  // flower center / gold
  'y': '#d9a94f',  // seed head gold
  'k': '#2a1c10'   // seed speck
};
// dry remap for wilting plants
const DRY = { s:'#6b5a32', g:'#7a6136', G:'#a08544', L:'#c2a75f',
              f:'#b08c68', F:'#c2a75f', y:'#d9a94f' };

/* ---------- 16x16 sprites, one per stage ---------- */
const SOIL_ROWS = [
  '................','................','................','................',
  '.DDDDDDDDDDDDDD.','................','................','................',
  '.DDDDDDDDDDDDDD.','................','................','................',
  '.DDDDDDDDDDDDDD.','................','................','................'
];
const SPRITES = [
  /* 0 soil */ SOIL_ROWS,
  /* 1 seed */ [
  '................','................','................','................',
  '................','................','................','................',
  '................','................','.......k........','......mmm.......',
  '.....mmmmm......','................','................','................'],
  /* 2 sprout */ [
  '................','................','................','................',
  '................','................','................','......L.L.......',
  '......GsG.......','.......s........','.......s........','......mmm.......',
  '.....mmmmm......','................','................','................'],
  /* 3 growing */ [
  '................','................','................','......L..L......',
  '.....LG..GL.....','......G.sG......','....GG.s........','.......s.GG.....',
  '.....G.s.G......','.......s........','.......s........','......mmm.......',
  '.....mmmmm......','................','................','................'],
  /* 4 bloom */ [
  '.......f........','......fFf.......','.......f........','.....L..s..L....',
  '....LG..s.GL....','......G.sG......','....GG.s........','.......s.GG.....',
  '.....G.s.G......','.......s........','.......s........','......mmm.......',
  '.....mmmmm......','................','................','................'],
  /* 5 gone to seed */ [
  '........yy......','.......yyyy.....','........yy......','.......s........',
  '.....g..s..g....','......g.s.g.....','.......ss.......','.......s........',
  '....g..s........','.....g.s.g......','.......s........','......mmm.......',
  '.....mmmmm......','................','................','................']
];
const STAGE_NAMES = ['soil','seed','sprout','growing','bloom','gone to seed'];
const SWAY_LINE = 9;          // sprite rows above this sway in frame B
const WILT_HOURS = 72;

/* ---------- state ---------- */
const DEMO = { name:'garden (demo)', size:[4,4], plots:{
  a1:{stage:1,title:'a fresh seed',planted:'2026-07-06',last_tended:null,note:'waiting for the first visit.'},
  b1:{stage:2,title:'a sprout',planted:'2026-07-01',last_tended:new Date(Date.now()-4*36e5).toISOString(),note:'first work exists.'},
  c2:{stage:3,title:'something growing',planted:'2026-06-20',last_tended:new Date(Date.now()-20*36e5).toISOString(),note:'taking shape.'},
  d2:{stage:4,title:'in bloom',planted:'2026-06-01',last_tended:new Date(Date.now()-8*36e5).toISOString(),note:'usable and alive.'},
  b3:{stage:3,title:'a wilting plot',planted:'2026-06-10',last_tended:new Date(Date.now()-120*36e5).toISOString(),note:'needs tending.'},
  a4:{stage:5,title:'gone to seed',planted:'2026-05-01',last_tended:new Date(Date.now()-60*36e5).toISOString(),note:'finished; offshoots in the seedbox.'}
}};

let garden = null, cols = 4, rows = 4, sel = null, frame = 0;
const T = 20;                              // tile size incl. 2px soil border
const canvas = document.getElementById('plot-canvas');
const ctx = canvas.getContext('2d');
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

const plotId = (c,r) => 'abcdefgh'[c] + (r+1);
const isWilting = p => p && p.stage>=2 && p.stage<=4 && p.last_tended &&
  (Date.now()-Date.parse(p.last_tended)) > WILT_HOURS*36e5;

/* ---------- render ---------- */
function drawSprite(g2, sprite, x, y, dry, swayX){
  for(let r=0;r<16;r++){
    const off = (swayX && r<SWAY_LINE) ? 1 : 0;
    for(let c=0;c<16;c++){
      const ch = sprite[r][c];
      if(ch==='.') continue;
      const col = (dry && DRY[ch]) ? DRY[ch] : PAL[ch];
      g2.fillStyle = col;
      g2.fillRect(x+c+off, y+r, 1, 1);
    }
  }
}
function render(){
  const W = cols*T+4, H = rows*T+4;
  canvas.width = W; canvas.height = H;
  canvas.style.aspectRatio = W+'/'+H;
  // grass frame + soil bed
  ctx.fillStyle = '#24361c'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#6b4830'; ctx.fillRect(2,2,W-4,H-4);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const x = 2+c*T, y = 2+r*T;
    // tile bed with furrow edge
    ctx.fillStyle = '#5e3f28'; ctx.fillRect(x+1,y+1,T-2,T-2);
    ctx.fillStyle = '#6b4830'; ctx.fillRect(x+2,y+2,T-4,T-4);
    const p = garden.plots[plotId(c,r)];
    const sprite = SPRITES[p ? p.stage : 0];
    const dry = isWilting(p);
    const sway = !reduceMotion && frame===1 && p && p.stage>=2;
    drawSprite(ctx, sprite, x+2, y+2, dry, sway);
    if(sel && sel[0]===c && sel[1]===r){
      ctx.strokeStyle = '#e6d9ae'; ctx.lineWidth = 1;
      ctx.strokeRect(x+.5, y+.5, T-1, T-1);
    }
  }
}

/* ---------- detail card ---------- */
const rel = iso => {
  if(!iso) return 'never';
  const h = Math.floor((Date.now()-Date.parse(iso))/36e5);
  return h<1 ? 'just now' : h<24 ? h+'h ago' : Math.floor(h/24)+'d ago';
};
// repo web URL: explicit garden.json "repo", else derived from a
// github.io project-pages address; null anywhere else (links hidden)
function repoBase(){
  if(garden.repo) return garden.repo.replace(/\/+$/,'');
  const m = location.hostname.match(/^([^.]+)\.github\.io$/);
  const seg = location.pathname.split('/').filter(Boolean)[0];
  return (m && seg) ? 'https://github.com/'+m[1]+'/'+seg : null;
}
function showCard(c,r){
  sel = [c,r]; render();
  const id = plotId(c,r), p = garden.plots[id], card = document.getElementById('card');
  card.querySelector('.links').textContent = '';
  const fb = document.getElementById('feedback');
  fb.hidden = !repoBase();
  fb.dataset.plot = id;
  if(!p){
    card.querySelector('.id').textContent = id;
    card.querySelector('h2').textContent = 'empty soil';
    card.querySelector('.meta').textContent = 'ready for a seed';
    card.querySelector('.note').textContent = 'plant one: add plots/'+id+'/seed.md and an entry in garden.json.';
    return;
  }
  card.querySelector('.id').textContent = id+' · '+STAGE_NAMES[p.stage]+(isWilting(p)?' · wilting':'');
  card.querySelector('h2').textContent = p.title || 'untitled';
  card.querySelector('.meta').textContent =
    'planted '+(p.planted||'—')+' · tended '+rel(p.last_tended);
  card.querySelector('.note').textContent = p.note || '';
  const links = card.querySelector('.links');
  const add = (txt,href)=>{ const a=document.createElement('a');
    a.href = href; a.textContent = txt; links.append(a); };
  if(p.door) add('open the work ↗', '../'+encodeURI(p.door));
  const base = repoBase();
  if(base){
    add('growth', base+'/tree/main/plots/'+id+'/growth');
    add('journal', base+'/blob/main/plots/'+id+'/journal.md');
    add('seed', base+'/blob/main/plots/'+id+'/seed.md');
  }
}

/* ---------- feedback ---------- */
document.getElementById('fb-send').addEventListener('click', ()=>{
  const fb = document.getElementById('feedback');
  const text = document.getElementById('fb-text').value.trim();
  const base = repoBase();
  if(!text || !base || !fb.dataset.plot) return;
  window.open(base+'/issues/new?title='
    +encodeURIComponent('feedback '+fb.dataset.plot)
    +'&body='+encodeURIComponent(text), '_blank');
  document.getElementById('fb-text').value = '';
});

/* ---------- input ---------- */
canvas.addEventListener('click', e=>{
  const b = canvas.getBoundingClientRect(), s = canvas.width/b.width;
  const c = Math.floor(((e.clientX-b.left)*s-2)/T);
  const r = Math.floor(((e.clientY-b.top)*s-2)/T);
  if(c>=0&&c<cols&&r>=0&&r<rows) showCard(c,r);
});
canvas.addEventListener('keydown', e=>{
  const k = e.key; if(!k.startsWith('Arrow')) return;
  e.preventDefault();
  let [c,r] = sel || [0,0];
  if(k==='ArrowRight') c=Math.min(cols-1,c+1);
  if(k==='ArrowLeft')  c=Math.max(0,c-1);
  if(k==='ArrowDown')  r=Math.min(rows-1,r+1);
  if(k==='ArrowUp')    r=Math.max(0,r-1);
  showCard(c,r);
});

/* ---------- legend ---------- */
function buildLegend(){
  const box = document.getElementById('legend');
  STAGE_NAMES.forEach((name,i)=>{
    const s = document.createElement('span');
    const cv = document.createElement('canvas');
    cv.width = 16; cv.height = 16;
    drawSprite(cv.getContext('2d'), SPRITES[i], 0, 0, false, false);
    s.append(cv, document.createTextNode(name));
    box.append(s);
  });
}

/* ---------- boot ---------- */
async function boot(){
  try{
    const res = await fetch('../garden.json', {cache:'no-store'});
    if(!res.ok) throw 0;
    garden = await res.json();
    document.getElementById('status').textContent =
      Object.keys(garden.plots).length+' planted · '+new Date().toLocaleDateString();
  }catch{
    garden = DEMO;
    document.getElementById('status').textContent = 'demo garden — no garden.json found';
  }
  cols = garden.size[0]; rows = garden.size[1];
  buildLegend(); render();
  if(!reduceMotion) setInterval(()=>{ frame ^= 1; render(); }, 800);
}
boot();
</script>
</body>
</html>
