<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>constellation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #05060a;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  canvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
  }
  .hint {
    position: fixed;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    color: #6a7290;
    font-size: 15px;
    letter-spacing: 0.08em;
    pointer-events: none;
    transition: opacity 1.6s ease;
    text-align: center;
    line-height: 1.6;
  }
  .reset {
    position: fixed;
    top: 18px;
    right: 22px;
    color: #4a5170;
    background: none;
    border: none;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease, color 0.2s ease;
    font-family: inherit;
    padding: 6px;
  }
  .reset:hover { color: #b8c0e0; }
  body:hover .reset { opacity: 0.55; }
  @media (hover: none) {
    .reset { opacity: 0.4; }
  }
  .back-link {
    position: fixed;
    left: 18px;
    bottom: 16px;
    color: #4a5170;
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 0.04em;
    z-index: 10;
    opacity: 0.6;
    transition: opacity 0.2s ease, color 0.2s ease;
  }
  .back-link:hover { color: #b8c0e0; opacity: 1; }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="hint" id="hint">touch the dark</div>
<button class="reset" id="reset" title="clear the sky">clear</button>
<a class="back-link" href="../../../viewer/">&larr; garden</a>

<script>
(function () {
  "use strict";

  var canvas = document.getElementById("sky");
  var ctx = canvas.getContext("2d");
  var hint = document.getElementById("hint");
  var resetBtn = document.getElementById("reset");

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W, H, LINK_DIST;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // recomputed on every resize, not just at load, so an orientation change
    // (portrait/landscape on a phone) doesn't leave new stars linking against
    // a stale window size from before the rotation
    LINK_DIST = Math.min(W, H) * 0.32;
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- audio ----
  var actx = null;
  var masterBus = null;
  function audio() {
    if (!actx) {
      actx = new (window.AudioContext || window.webkitAudioContext)();
      // every chime and the drag-tone route through here on their way to the
      // speakers. Nothing here shapes the sound during ordinary sparse play —
      // it only engages if a dense burst of clicks near a tight cluster stacks
      // enough simultaneous chimes to sum past 0dB, which visit 1 flagged as
      // untested and no sitting since had gone back to check.
      var compressor = actx.createDynamicsCompressor();
      compressor.threshold.value = -6;
      compressor.knee.value = 6;
      compressor.ratio.value = 20;
      compressor.attack.value = 0.003;
      compressor.release.value = 0.25;
      compressor.connect(actx.destination);
      masterBus = actx.createGain();
      masterBus.gain.value = 1;
      masterBus.connect(compressor);
    }
    if (actx.state === "suspended") actx.resume();
    return actx;
  }

  // pentatonic scale across five octaves — any combination of notes sounds consonant
  var BASE = [0, 2, 4, 7, 9]; // major pentatonic semitone offsets
  var SCALE = [];
  for (var oct = 2; oct <= 6; oct++) {
    for (var i = 0; i < BASE.length; i++) {
      SCALE.push(220 * Math.pow(2, oct - 4 + BASE[i] / 12));
    }
  }
  SCALE.sort(function (a, b) { return a - b; });

  function pitchAt(y) {
    var t = Math.max(0, Math.min(1, y / H));
    // top of screen = high notes, bottom = low notes
    var idx = Math.floor((1 - t) * (SCALE.length - 1));
    return SCALE[idx];
  }

  // a star's shimmer narrows as it ages: freshly placed, its overtone sits
  // wide of the octave (bright, unsettled); by SETTLE_SECS it has drawn in
  // toward a calmer, purer overtone — one gradient driven by star.born,
  // not per-star state, so an old constellation plucked later sounds
  // noticeably steadier than the moment it was made
  var YOUNG_DETUNE = 2.011;
  var OLD_DETUNE = 2.003;
  var SETTLE_SECS = 45;
  function detuneFor(star) {
    var age = (performance.now() - star.born) / 1000;
    var t = Math.min(1, age / SETTLE_SECS);
    return YOUNG_DETUNE - (YOUNG_DETUNE - OLD_DETUNE) * t;
  }

  function chime(freq, delay, gainScale, detuneRatio) {
    var ac = audio();
    var t0 = ac.currentTime + (delay || 0);
    var g = gainScale === undefined ? 1 : gainScale;
    var dr = detuneRatio === undefined ? 2.006 : detuneRatio;

    var osc1 = ac.createOscillator();
    osc1.type = "sine";
    osc1.frequency.value = freq;

    var osc2 = ac.createOscillator();
    osc2.type = "triangle";
    osc2.frequency.value = freq * dr; // detune for shimmer, narrows with age

    var filt = ac.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.value = freq * 6;
    filt.Q.value = 0.6;

    var env = ac.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.22 * g, t0 + 0.012);
    env.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.6);

    var env2 = ac.createGain();
    env2.gain.value = 0.09 * g;

    osc1.connect(filt);
    osc2.connect(env2);
    env2.connect(filt);
    filt.connect(env);
    env.connect(masterBus);

    osc1.start(t0);
    osc2.start(t0);
    osc1.stop(t0 + 1.7);
    osc2.stop(t0 + 1.7);
  }

  // continuous theremin-style tone used while dragging a star
  var dragTone = null;
  function dragToneStart() {
    var ac = audio();
    var osc = ac.createOscillator();
    osc.type = "sine";
    var g = ac.createGain();
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.06, ac.currentTime + 0.08);
    osc.connect(g);
    g.connect(masterBus);
    osc.start();
    dragTone = { osc: osc, g: g };
  }
  function dragToneSet(freq) {
    if (!dragTone) return;
    var ac = audio();
    dragTone.osc.frequency.linearRampToValueAtTime(freq, ac.currentTime + 0.05);
  }
  function dragToneStop() {
    if (!dragTone) return;
    var ac = audio();
    var d = dragTone;
    d.g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.15);
    d.osc.stop(ac.currentTime + 0.2);
    dragTone = null;
  }

  // ---- stars & constellation graph ----
  var stars = [];   // {x, y, anchorX, anchorY, freq, phase, born, driftSeed, driftSpeed}
  var edges = [];   // {a, b, pluckedAt, restDist, lastAmbient} indices into stars
  var dragging = null;

  var LINK_MAX = 2;

  // once the sky has been left alone a while, stars sway gently on their own —
  // suspended, wind-chime motion, not a drift that carries them anywhere new
  var lastInteraction = performance.now();
  var IDLE_MS = 3500;
  var IDLE_RAMP_MS = 1200;
  var DRIFT_AMP_X = 9;
  var DRIFT_AMP_Y = 7;
  var AMBIENT_CLOSE_DELTA = 10;
  var AMBIENT_COOLDOWN_MS = 6000;

  function addStar(x, y) {
    var freq = pitchAt(y);
    var star = {
      x: x, y: y, anchorX: x, anchorY: y, freq: freq,
      phase: Math.random() * Math.PI * 2, born: performance.now(),
      driftSeed: Math.random() * 1000, driftSpeed: 0.7 + Math.random() * 0.6
    };
    var idx = stars.length;
    stars.push(star);

    var candidates = [];
    for (var i = 0; i < idx; i++) {
      var s = stars[i];
      var d = Math.hypot(s.x - x, s.y - y);
      if (d < LINK_DIST) candidates.push({ i: i, d: d });
    }
    candidates.sort(function (a, b) { return a.d - b.d; });
    var linked = candidates.slice(0, LINK_MAX);

    linked.forEach(function (c, k) {
      edges.push({ a: c.i, b: idx, restDist: c.d, lastAmbient: 0 });
      chime(stars[c.i].freq, k * 0.09, 0.85, detuneFor(stars[c.i]));
      chime(star.freq, 0.12 + k * 0.09, 1, detuneFor(star));
    });
    if (linked.length === 0) {
      chime(star.freq, 0, 1, detuneFor(star));
    }
    return idx;
  }

  // soft, slow answer to a full pluck — two quiet notes, wider apart, as if
  // the connection rang itself when its two stars swayed close
  function ambientChime(edgeIdx) {
    var e = edges[edgeIdx];
    var a = stars[e.a], b = stars[e.b];
    if (!a || !b) return;
    e.lastAmbient = performance.now();
    e.pluckedAt = performance.now();
    e.ambient = true;
    chime(a.freq, 0, 0.3, detuneFor(a));
    chime(b.freq, 0.15, 0.3, detuneFor(b));
  }

  function edgesFor(idx) {
    return edges.filter(function (e) { return e.a === idx || e.b === idx; });
  }

  function hitTest(x, y) {
    var best = -1, bestD = 18;
    for (var i = 0; i < stars.length; i++) {
      var d = Math.hypot(stars[i].x - x, stars[i].y - y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // distance from point p to segment ab, for plucking a connection line
  function pointSegDist(px, py, ax, ay, bx, by) {
    var dx = bx - ax, dy = by - ay;
    var lenSq = dx * dx + dy * dy;
    var t = lenSq > 0 ? ((px - ax) * dx + (py - ay) * dy) / lenSq : 0;
    t = Math.max(0, Math.min(1, t));
    var cx = ax + t * dx, cy = ay + t * dy;
    return Math.hypot(px - cx, py - cy);
  }

  function edgeHitTest(x, y) {
    var best = -1, bestD = 9;
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      var a = stars[e.a], b = stars[e.b];
      if (!a || !b) continue;
      var d = pointSegDist(x, y, a.x, a.y, b.x, b.y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // plucking an existing line plays its two notes as a quick arpeggio,
  // like running a finger along a strung wire, and lights the line up
  function pluck(edgeIdx) {
    var e = edges[edgeIdx];
    var a = stars[e.a], b = stars[e.b];
    if (!a || !b) return;
    e.pluckedAt = performance.now();
    e.ambient = false;
    chime(a.freq, 0, 0.8, detuneFor(a));
    chime(b.freq, 0.07, 0.8, detuneFor(b));
  }

  function clientToLocal(evt) {
    var rect = canvas.getBoundingClientRect();
    var cx = (evt.touches ? evt.touches[0].clientX : evt.clientX) - rect.left;
    var cy = (evt.touches ? evt.touches[0].clientY : evt.clientY) - rect.top;
    return { x: cx, y: cy };
  }

  function hideHint() {
    hint.style.opacity = "0";
  }

  canvas.addEventListener("pointerdown", function (evt) {
    lastInteraction = performance.now();
    var p = clientToLocal(evt);
    var hit = hitTest(p.x, p.y);
    if (hit >= 0) {
      dragging = hit;
      dragToneStart();
      dragToneSet(stars[hit].freq);
    } else {
      var edgeHit = edgeHitTest(p.x, p.y);
      if (edgeHit >= 0) {
        pluck(edgeHit);
        hideHint();
      } else {
        addStar(p.x, p.y);
        hideHint();
      }
    }
  });

  window.addEventListener("pointermove", function (evt) {
    if (dragging === null) return;
    lastInteraction = performance.now();
    var p = clientToLocal(evt);
    var s = stars[dragging];
    s.x = Math.max(4, Math.min(W - 4, p.x));
    s.y = Math.max(4, Math.min(H - 4, p.y));
    s.anchorX = s.x;
    s.anchorY = s.y;
    s.freq = pitchAt(s.y);
    dragToneSet(s.freq);
  });

  window.addEventListener("pointerup", function () {
    if (dragging !== null) {
      dragToneStop();
      dragging = null;
    }
  });

  resetBtn.addEventListener("click", function (evt) {
    evt.stopPropagation();
    lastInteraction = performance.now();
    stars = [];
    edges = [];
    hint.style.opacity = "0.0";
    hint.textContent = "touch the dark";
    window.setTimeout(function () { hint.style.opacity = "1"; }, 50);
  });

  // ---- render loop ----
  function draw(now) {
    ctx.clearRect(0, 0, W, H);

    // vignette
    var grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.75);
    grad.addColorStop(0, "#0a0d18");
    grad.addColorStop(1, "#05060a");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // idle sway: once nothing has been touched for a while, stars ease into a
    // slow, bounded wander around where they were placed or dropped — never
    // travels anywhere, just breathes. Any interaction snaps it back to rest.
    var idleFor = now - lastInteraction;
    var driftAmount = idleFor > IDLE_MS ? Math.min(1, (idleFor - IDLE_MS) / IDLE_RAMP_MS) : 0;
    for (var d = 0; d < stars.length; d++) {
      var sd = stars[d];
      if (driftAmount > 0) {
        sd.x = sd.anchorX + Math.sin(now / 1000 * 0.33 + sd.driftSeed) * DRIFT_AMP_X * driftAmount * sd.driftSpeed;
        sd.y = sd.anchorY + Math.cos(now / 1000 * 0.24 + sd.driftSeed * 1.7) * DRIFT_AMP_Y * driftAmount * sd.driftSpeed;
      } else {
        sd.x = sd.anchorX;
        sd.y = sd.anchorY;
      }
    }

    // a connection that sways close to its rest length while drifting rings
    // itself softly — the sky occasionally answering its own motion
    if (driftAmount > 0.95) {
      for (var j = 0; j < edges.length; j++) {
        var ea = edges[j];
        var sa = stars[ea.a], sb = stars[ea.b];
        if (!sa || !sb) continue;
        var dist = Math.hypot(sa.x - sb.x, sa.y - sb.y);
        if (dist < ea.restDist - AMBIENT_CLOSE_DELTA && now - ea.lastAmbient > AMBIENT_COOLDOWN_MS) {
          ambientChime(j);
        }
      }
    }

    // edges
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      var a = stars[e.a], b = stars[e.b];
      if (!a || !b) continue;
      var since = e.pluckedAt ? (now - e.pluckedAt) / 1000 : Infinity;
      var glow = Math.max(0, 1 - since / 0.5); // fades over half a second
      if (e.ambient) glow *= 0.5; // ambient rings softer than a direct pluck
      var alpha = 0.35 + glow * 0.55;
      ctx.lineWidth = 1 + glow * 1.8;
      ctx.strokeStyle = "rgba(140,160,255," + alpha + ")";
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // stars
    for (var s2 = 0; s2 < stars.length; s2++) {
      var st = stars[s2];
      var age = (now - st.born) / 1000;
      var settle = Math.min(1, age / 0.4);
      var twinkle = 0.75 + 0.25 * Math.sin(now / 700 + st.phase);
      var r = (2.4 + settle * 1.6) * twinkle;

      var glow = ctx.createRadialGradient(st.x, st.y, 0, st.x, st.y, r * 6);
      glow.addColorStop(0, "rgba(210,225,255,0.55)");
      glow.addColorStop(1, "rgba(210,225,255,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(st.x, st.y, r * 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#f2f5ff";
      ctx.beginPath();
      ctx.arc(st.x, st.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
