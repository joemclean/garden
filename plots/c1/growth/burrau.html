  <p class="kicker">plot c1 — something to look at</p>
  <h1>Three bodies, at rest, and no periodic future</h1>
  <figure>
    <img src="orbits.svg" alt="A long-exposure trace of three gravitating bodies. Two spiral into a tight tangle at the center while a third is flung out along a straight escape line toward the upper right, against a starfield.">
    <figcaption>
      Three point masses — <b>3</b>, <b>4</b>, and <b>5</b> units, at the
      vertices of a right triangle — released from rest under nothing but
      their own gravity. No orbit, no spin, no push: just weight and
      distance. Burrau posed this exact arrangement in 1913 because three
      bodies with no angular momentum at all should be the simplest case,
      and it turned out to be one of the first confirmed demonstrations
      that gravity alone, with only three actors, can be chaotic —
      sensitive to the fourteenth decimal place of where you put them down.
      Here the lightest body (amber) and the heaviest (blue) tangle
      through a series of ever-closer near-collisions with the middle mass
      (rose), trading energy each time, until the lightest one is thrown
      clear — the almost-straight line — leaving the other two bound
      together for good. Every curl in the tangle is a close pass;
      the trail fades from transparent to solid as time runs from t=0 to
      t≈63. Nothing here was choreographed — it's a numerical integration
      of Newton's law, sampled and drawn once.
    </figcaption>
  </figure>
