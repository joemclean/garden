<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Field That Waits — title sequence</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: #050505;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
  }
  .frame {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #050505;
  }
  .stage {
    position: relative;
    width: 100%; max-width: 1600px;
    aspect-ratio: 16 / 9;
    max-height: 100vh;
    background: #000;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.9);
  }
  svg.scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* --- sky --- */
  .sky-top { animation: skyTop 54s ease-in-out 1 forwards; }
  .sky-bottom { animation: skyBottom 54s ease-in-out 1 forwards; }
  @keyframes skyTop {
    0%   { stop-color: #060a1c; }
    22%  { stop-color: #3a2748; }
    40%  { stop-color: #c96a3c; }
    62%  { stop-color: #bfe0f0; }
    100% { stop-color: #bfe0f0; }
  }
  @keyframes skyBottom {
    0%   { stop-color: #131c3a; }
    22%  { stop-color: #7a3f4d; }
    40%  { stop-color: #f2b06a; }
    62%  { stop-color: #eef8ff; }
    100% { stop-color: #eef8ff; }
  }

  .sun {
    animation: rise 54s cubic-bezier(.2,.6,.3,1) 1 forwards;
    filter: blur(0.5px);
  }
  @keyframes rise {
    0%   { transform: translateY(0px); opacity: 0.0; }
    6%   { opacity: 1; }
    60%  { transform: translateY(-620px); opacity: 1; }
    100% { transform: translateY(-660px); opacity: 0.85; }
  }

  .ground { fill: #232b16; }
  .ground-far { fill: #2c3a1c; }

  .blade {
    transform-origin: bottom center;
    animation-name: sway;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    animation-direction: alternate;
  }
  @keyframes sway {
    0%   { transform: rotate(-3.5deg); }
    100% { transform: rotate(3.5deg); }
  }

  .bird {
    animation-name: fly;
    animation-timing-function: linear;
    animation-iteration-count: 1;
    animation-fill-mode: forwards;
    opacity: 0;
  }
  @keyframes fly {
    0%   { transform: translate(-80px, 0px); opacity: 0; }
    4%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translate(1750px, -60px); opacity: 0; }
  }

  .train-group {
    animation: trainPass 54s linear 1 forwards;
  }
  @keyframes trainPass {
    0%, 56%   { transform: translateX(-420px); }
    68%       { transform: translateX(1700px); }
    100%      { transform: translateX(1700px); }
  }
  .smoke {
    animation-name: puff;
    animation-timing-function: ease-out;
    animation-iteration-count: infinite;
    opacity: 0;
  }
  @keyframes puff {
    0%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    15%  { opacity: 0.55; }
    100% { transform: translate(-40px,-70px) scale(1.6); opacity: 0; }
  }

  /* --- curtain (the ending) --- */
  .curtain {
    position: absolute; inset: 0; background: #000;
    opacity: 0;
    animation: darken 54s ease-in 1 forwards;
    pointer-events: none;
  }
  @keyframes darken {
    0%, 92% { opacity: 0; }
    100%    { opacity: 1; }
  }

  /* --- title cards --- */
  .titles {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    pointer-events: none;
  }
  .card {
    position: absolute;
    color: #f4ecd8;
    opacity: 0;
    letter-spacing: 0.12em;
    text-shadow: 0 0 18px rgba(0,0,0,0.8), 0 2px 6px rgba(0,0,0,0.6);
    animation-duration: 54s;
    animation-timing-function: ease-in-out;
    animation-iteration-count: 1;
    animation-fill-mode: forwards;
    width: 80%;
  }
  .studio    { font-size: 2.1vw; animation-name: cardStudio; }
  .presents  { font-size: 1.3vw; font-style: italic; animation-name: cardPresents; }
  .director  { font-size: 1.5vw; animation-name: cardDirector; }
  .cast      { font-size: 1.4vw; animation-name: cardCast; }
  .intro     { font-size: 1.4vw; animation-name: cardIntro; }
  .maintitle { font-size: 4.4vw; font-weight: bold; animation-name: cardMain; }
  .tagline   { font-size: 1.3vw; font-style: italic; animation-name: cardTagline; top: 60%; }
  .fine      { font-size: 1.1vw; opacity: 0; letter-spacing: 0.2em; animation-name: cardFine; color: #9a9a9a; }

  @keyframes cardStudio   { 0%,2% {opacity:0;} 5%,11% {opacity:1;} 15%,100% {opacity:0;} }
  @keyframes cardPresents { 0%,13% {opacity:0;} 16%,20% {opacity:1;} 24%,100% {opacity:0;} }
  @keyframes cardDirector { 0%,24% {opacity:0;} 27%,33% {opacity:1;} 37%,100% {opacity:0;} }
  @keyframes cardCast     { 0%,38% {opacity:0;} 41%,47% {opacity:1;} 51%,100% {opacity:0;} }
  @keyframes cardIntro    { 0%,51% {opacity:0;} 54%,59% {opacity:1;} 63%,100% {opacity:0;} }
  @keyframes cardMain     { 0%,74% {opacity:0;} 78%,90% {opacity:1;} 96%,100% {opacity:0;} }
  @keyframes cardTagline  { 0%,80% {opacity:0;} 84%,90% {opacity:1;} 96%,100% {opacity:0;} }
  @keyframes cardFine     { 0%,95% {opacity:0;} 98%,100% {opacity:1;} }

  .back-link {
    position: fixed; left: 14px; bottom: 12px;
    font-family: Georgia, serif;
    font-size: 12px;
    color: #7a7a7a;
    text-decoration: none;
    letter-spacing: 0.04em;
    z-index: 10;
    opacity: 0.7;
  }
  .back-link:hover { color: #d8d8d8; opacity: 1; }
</style>
</head>
<body>
  <div class="frame">
    <div class="stage">
      <svg class="scene" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop class="sky-top" offset="0%" stop-color="#060a1c"/>
            <stop class="sky-bottom" offset="100%" stop-color="#131c3a"/>
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="1600" height="900" fill="url(#sky)"/>
        <circle class="sun" cx="1260" cy="960" r="66" fill="#fff2c8"/>
        <g id="birds"></g>
        <rect class="ground-far" x="0" y="600" width="1600" height="80"/>
        <rect class="ground" x="0" y="660" width="1600" height="240"/>
        <g class="train-group" id="train">
          <rect x="0" y="606" width="130" height="46" rx="4" fill="#1a1a1a"/>
          <rect x="12" y="616" width="20" height="16" fill="#7a8a92"/>
          <rect x="40" y="616" width="20" height="16" fill="#7a8a92"/>
          <rect x="68" y="616" width="20" height="16" fill="#7a8a92"/>
          <circle class="smoke" cx="20" cy="600" r="10" fill="#cfcfcf" style="animation-duration:2.6s; animation-delay:0s;"/>
          <circle class="smoke" cx="20" cy="600" r="9"  fill="#cfcfcf" style="animation-duration:2.6s; animation-delay:0.9s;"/>
          <circle class="smoke" cx="20" cy="600" r="11" fill="#cfcfcf" style="animation-duration:2.6s; animation-delay:1.8s;"/>
        </g>
        <g id="wheat"></g>
      </svg>
      <div class="curtain"></div>
      <div class="titles">
        <div class="card studio">MERIDIAN LOW-LIGHT PICTURES</div>
        <div class="card presents">presents</div>
        <div class="card director">a film by Ilsa Ferro</div>
        <div class="card cast">starring Odell Marsh &amp; Priya Nandakumar</div>
        <div class="card intro">and introducing Tomas Ekdahl</div>
        <div class="card maintitle">THE FIELD<br>THAT WAITS</div>
        <div class="card tagline">every harvest keeps a promise</div>
        <div class="card fine">— coming to no theater near you —</div>
      </div>
    </div>
  </div>
  <a class="back-link" href="../../../viewer/">← garden</a>

<script>
  // Procedural wheat: a field of blades, each with its own sway timing so
  // the whole row moves like one continuous surface rather than a repeat tile.
  (function () {
    const wheat = document.getElementById('wheat');
    const n = 90;
    for (let i = 0; i < n; i++) {
      const x = 20 + (1560 * i) / (n - 1) + (Math.random() * 10 - 5);
      const baseY = 900;
      const topY = 660 + Math.random() * 30;
      const h = baseY - topY;
      const lean = (Math.random() * 6 - 3);
      const blade = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const midX = x + lean;
      blade.setAttribute(
        'd',
        `M ${x} ${baseY} Q ${midX} ${topY + h * 0.4} ${x + lean * 1.6} ${topY}`
      );
      blade.setAttribute('fill', 'none');
      blade.setAttribute('stroke', i % 3 === 0 ? '#d8b25a' : '#c79f4a');
      blade.setAttribute('stroke-width', 2.4 + Math.random() * 1.2);
      blade.setAttribute('stroke-linecap', 'round');
      blade.setAttribute('class', 'blade');
      blade.style.animationDuration = (2.6 + Math.random() * 2.2) + 's';
      blade.style.animationDelay = (-Math.random() * 4) + 's';
      blade.style.transformBox = 'fill-box';
      wheat.appendChild(blade);
    }
  })();

  // A handful of birds crossing at staggered moments during the early cards,
  // each a simple two-stroke wingmark rather than anything literal.
  (function () {
    const birds = document.getElementById('birds');
    const flights = [
      { y: 140, delay: 4,  dur: 9,  scale: 1.0 },
      { y: 190, delay: 6.5, dur: 10, scale: 0.8 },
      { y: 110, delay: 20, dur: 8,  scale: 0.9 },
      { y: 230, delay: 34, dur: 11, scale: 1.1 },
      { y: 165, delay: 36.5, dur: 9,  scale: 0.75 },
    ];
    flights.forEach((f) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const s = f.scale;
      g.setAttribute('d', `M 0 ${f.y} q 10 ${-10*s} 20 0 q 10 ${-10*s} 20 0`);
      g.setAttribute('fill', 'none');
      g.setAttribute('stroke', '#1b1b1b');
      g.setAttribute('stroke-width', 2.2);
      g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('class', 'bird');
      g.style.animationDuration = f.dur + 's';
      g.style.animationDelay = f.delay + 's';
      birds.appendChild(g);
    });
  })();
</script>
</body>
</html>
