<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Undersea</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #01141d; }
  canvas { display: block; }
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: rgba(220, 240, 245, 0.85);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  #hint {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: auto;
    cursor: pointer;
    background: rgba(2, 20, 28, 0.55);
    border: 1px solid rgba(180, 220, 230, 0.25);
    border-radius: 10px;
    padding: 22px 30px;
    backdrop-filter: blur(2px);
  }
  #hint b { font-size: 17px; display: block; margin-bottom: 8px; letter-spacing: 0.03em; }
  #hint .keys { opacity: 0.85; font-size: 13px; }
  #depth {
    position: absolute; left: 16px; bottom: 14px;
    opacity: 0.75;
  }
  #back {
    position: absolute; left: 16px; top: 14px;
    opacity: 0.6;
    pointer-events: auto;
    color: inherit;
    text-decoration: none;
  }
  #back:hover { opacity: 1; }
  #hud.hidden #hint { display: none; }
</style>
</head>
<body>
<div id="hud">
  <div id="hint">
    <b>Undersea</b>
    <div class="keys">click to dive in</div>
    <div class="keys">mouse — look &middot; WASD — swim &middot; space / shift — rise / sink</div>
    <div class="keys">esc — surface</div>
  </div>
  <div id="depth"></div>
  <a id="back" href="../../../viewer/">&larr; garden</a>
</div>
<script type="module">
import * as THREE from './three.module.min.js';

const scene = new THREE.Scene();
const fogColor = new THREE.Color(0x0a3947);
scene.fog = new THREE.FogExp2(fogColor.getHex(), 0.045);
scene.background = fogColor;

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.05, 200);
camera.position.set(0, -2, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ---------- light falling from above ----------
const SUN_BASE = 1.4, FILL_BASE = 0.9, GLOW_BASE = 0.6;
const sun = new THREE.DirectionalLight(0xbfe9ea, SUN_BASE);
sun.position.set(4, 30, -6);
scene.add(sun);

const fill = new THREE.AmbientLight(0x0e4f5c, FILL_BASE);
scene.add(fill);

const glow = new THREE.HemisphereLight(0x6fd3d9, 0x02121a, GLOW_BASE);
scene.add(glow);

// The seed's "light falling from a surface somewhere above" has always been
// implied by the god-ray shafts (static) but never actually responded to the
// swimmer's own depth — the light itself was flat everywhere. A neutral band
// (-8..2) covers where every prior visit's screenshots were actually taken,
// so this only brightens/dims near the swim rig's own y-caps (8 at the top,
// -20 at the bottom in tick()) — the two extremes nobody had visually
// checked before this visit measured a real but shallow brightness gradient
// there and found nothing tying it to an actual light change.
function depthLightFactor(y) {
  const NEUTRAL_HI = 2, NEUTRAL_LO = -8, SURFACE_Y = 8, ABYSS_Y = -20;
  if (y > NEUTRAL_HI) {
    return 1 + Math.min(1, (y - NEUTRAL_HI) / (SURFACE_Y - NEUTRAL_HI)) * 0.35;
  }
  if (y < NEUTRAL_LO) {
    return 1 - Math.min(1, (NEUTRAL_LO - y) / (NEUTRAL_LO - ABYSS_Y)) * 0.35;
  }
  return 1;
}

// Same neutral band, same reasoning, applied to the water itself rather
// than the light falling through it: `fogColor` is the live color object
// (scene.background already points at this same instance, so mutating it
// in place moves both together) and scene.fog.color is a separate Color
// FogExp2's constructor made from a starting hex, synced each tick below.
// Clearer, cooler water near the surface; thicker, darker water pressing
// in toward the abyss — nothing changes inside the neutral band, so every
// screenshot any prior visit has taken there is untouched.
const fogColorNeutral = fogColor.clone();
const fogColorSurface = new THREE.Color(0x1c6270);
const fogColorAbyss = new THREE.Color(0x030c0f);
const FOG_BASE_DENSITY = scene.fog.density;

function depthFogFactor(y) {
  const NEUTRAL_HI = 2, NEUTRAL_LO = -8, SURFACE_Y = 8, ABYSS_Y = -20;
  if (y > NEUTRAL_HI) {
    const t = Math.min(1, (y - NEUTRAL_HI) / (SURFACE_Y - NEUTRAL_HI));
    return { density: 1 - t * 0.3, target: fogColorSurface, t };
  }
  if (y < NEUTRAL_LO) {
    const t = Math.min(1, (NEUTRAL_LO - y) / (NEUTRAL_LO - ABYSS_Y));
    return { density: 1 + t * 0.45, target: fogColorAbyss, t };
  }
  return { density: 1, target: fogColorNeutral, t: 0 };
}

// Third system built on the same neutral band: the "gentle current sway"
// below (tick()) has been a flat, depth-blind nudge since visit 1 — the
// same gap visits 22-23 closed for light and fog, and visit 23 named this
// (alongside particulate drift) as the one thing left that reads depth
// without responding to it. Real currents are wave-driven and strongest
// near a surface, stillest in deep, sheltered water, so this ramps the
// swimmer's passive drift up approaching the y=8 cap and down approaching
// the y=-20 floor — unchanged across the same -8..2 neutral band every
// prior visit's screenshots and swims were taken in.
function depthCurrentFactor(y) {
  const NEUTRAL_HI = 2, NEUTRAL_LO = -8, SURFACE_Y = 8, ABYSS_Y = -20;
  if (y > NEUTRAL_HI) {
    return 1 + Math.min(1, (y - NEUTRAL_HI) / (SURFACE_Y - NEUTRAL_HI)) * 0.6;
  }
  if (y < NEUTRAL_LO) {
    return 1 - Math.min(1, (NEUTRAL_LO - y) / (NEUTRAL_LO - ABYSS_Y)) * 0.65;
  }
  return 1;
}

// god-ray shafts: soft additive planes hanging from the surface, swaying
const shaftMat = new THREE.MeshBasicMaterial({
  color: 0xbfe9ea,
  transparent: true,
  opacity: 0.05,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const shafts = [];
for (let i = 0; i < 10; i++) {
  const w = 1.2 + Math.random() * 1.8;
  const h = 40;
  const geo = new THREE.PlaneGeometry(w, h, 1, 8);
  const mesh = new THREE.Mesh(geo, shaftMat.clone());
  mesh.material.opacity = 0.03 + Math.random() * 0.05;
  mesh.position.set((Math.random() - 0.5) * 50, h / 2 - 15, (Math.random() - 0.5) * 50 - 10);
  mesh.rotation.y = Math.random() * Math.PI;
  mesh.userData.sway = Math.random() * Math.PI * 2;
  scene.add(mesh);
  shafts.push(mesh);
}

// ---------- the floor, sloping away into darkness ----------
const floorGeo = new THREE.PlaneGeometry(160, 220, 60, 80);
floorGeo.rotateX(-Math.PI / 2);
{
  const pos = floorGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    // slope downward with distance, plus gentle undulation
    const slope = -6 - z * 0.35;
    const bump = Math.sin(x * 0.15 + z * 0.08) * 0.6 + Math.sin(x * 0.6 - z * 0.3) * 0.25;
    pos.setY(i, slope + bump);
  }
  floorGeo.computeVertexNormals();
}
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0c3038,
  roughness: 1,
  metalness: 0,
  fog: true,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.z = -60;
scene.add(floor);

// ---------- kelp, swaying on the sloping floor ----------
// The floor's height at any (x, z) is reproducible from the same slope +
// bump formula used to build its geometry above (mesh is at z-offset -60).
function floorHeightAt(x, worldZ) {
  const z = worldZ + 60;
  const slope = -6 - z * 0.35;
  const bump = Math.sin(x * 0.15 + z * 0.08) * 0.6 + Math.sin(x * 0.6 - z * 0.3) * 0.25;
  return slope + bump;
}

const kelpColors = [0x1f5c3a, 0x27703f, 0x184a30, 0x2d6b3a];
const kelpMats = kelpColors.map(
  (c) =>
    new THREE.MeshStandardMaterial({
      color: c,
      roughness: 1,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.88,
      fog: true,
    })
);

const kelpStalks = [];
function makeKelp(baseX, baseZ, height, segCount) {
  const baseY = floorHeightAt(baseX, baseZ);
  const group = new THREE.Object3D();
  group.position.set(baseX, baseY, baseZ);
  group.rotation.y = Math.random() * Math.PI;
  scene.add(group);

  const segLen = height / segCount;
  const baseWidth = 0.45 + Math.random() * 0.35;
  const mat = kelpMats[(Math.random() * kelpMats.length) | 0];

  let parent = group;
  const segments = [];
  for (let i = 0; i < segCount; i++) {
    const w = baseWidth * (1 - (i / segCount) * 0.55);
    const geo = new THREE.PlaneGeometry(w, segLen, 1, 1);
    geo.translate(0, segLen / 2, 0); // pivot at the blade's base, like a hinge
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = i === 0 ? 0 : segLen;
    parent.add(mesh);
    parent = mesh;
    segments.push(mesh);
  }
  kelpStalks.push({ segments, phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 0.3 });
}

// Two loose beds along the swim-forward path, not a uniform grid.
for (let i = 0; i < 11; i++) {
  const x = -9 + Math.random() * 18;
  const z = -18 - Math.random() * 14;
  makeKelp(x, z, 4.5 + Math.random() * 4, 4 + ((Math.random() * 3) | 0));
}
for (let i = 0; i < 9; i++) {
  const x = -22 + Math.random() * 14;
  const z = -42 - Math.random() * 16;
  makeKelp(x, z, 5 + Math.random() * 4.5, 4 + ((Math.random() * 3) | 0));
}

// ---------- reef: a static cluster of rock and coral off to one side ----------
// Kelp claims x -22..9 (roughly, see the two bed loops above); the reef sits
// on the opposite side of the swim-forward path so the two never overlap.
const rockMat = new THREE.MeshStandardMaterial({ color: 0x1a2e33, roughness: 1, flatShading: true, fog: true });
const rockMat2 = new THREE.MeshStandardMaterial({ color: 0x223a40, roughness: 1, flatShading: true, fog: true });
const coralColors = [0xd9704f, 0xc65d8a, 0xdba13a, 0x8a6fc9, 0xd4864f];
const coralMats = coralColors.map(
  (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.85, flatShading: true, fog: true })
);

const reefSway = [];
function makeReef(centerX, centerZ, spread) {
  const reefGroup = new THREE.Object3D();
  scene.add(reefGroup);

  // rock base: irregular boulders bedded into the slope
  const rockCount = 15;
  for (let i = 0; i < rockCount; i++) {
    const x = centerX + (Math.random() - 0.5) * spread;
    const z = centerZ + (Math.random() - 0.5) * spread * 0.7;
    const baseY = floorHeightAt(x, z);
    const scale = 0.7 + Math.random() * 1.6;
    const geo = new THREE.IcosahedronGeometry(scale, 0);
    // knock the vertices around so boulders don't read as perfect icosahedra
    const pos = geo.attributes.position;
    for (let v = 0; v < pos.count; v++) {
      pos.setXYZ(
        v,
        pos.getX(v) + (Math.random() - 0.5) * scale * 0.25,
        pos.getY(v) + (Math.random() - 0.5) * scale * 0.25,
        pos.getZ(v) + (Math.random() - 0.5) * scale * 0.25
      );
    }
    geo.computeVertexNormals();
    const rock = new THREE.Mesh(geo, Math.random() < 0.5 ? rockMat : rockMat2);
    rock.position.set(x, baseY + scale * 0.3, z);
    rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    reefGroup.add(rock);
  }

  // coral: branching (cones), boulder (spheres), and brain (tori) forms
  // planted on top of the rock cluster, plus a few soft fans that sway
  const coralCount = 16;
  for (let i = 0; i < coralCount; i++) {
    const x = centerX + (Math.random() - 0.5) * spread * 0.9;
    const z = centerZ + (Math.random() - 0.5) * spread * 0.6;
    const baseY = floorHeightAt(x, z);
    const mat = coralMats[(Math.random() * coralMats.length) | 0];
    const kind = Math.random();
    let mesh;
    if (kind < 0.4) {
      // branching coral: a cluster of thin cones fanning from one point
      mesh = new THREE.Object3D();
      const branches = 3 + ((Math.random() * 3) | 0);
      for (let b = 0; b < branches; b++) {
        const h = 0.6 + Math.random() * 0.9;
        const branch = new THREE.Mesh(new THREE.ConeGeometry(0.12 + Math.random() * 0.06, h, 5), mat);
        branch.position.y = h / 2;
        branch.rotation.z = (Math.random() - 0.5) * 0.9;
        branch.rotation.x = (Math.random() - 0.5) * 0.9;
        mesh.add(branch);
      }
    } else if (kind < 0.7) {
      // boulder coral: a squat, bumpy sphere
      const geo = new THREE.SphereGeometry(0.35 + Math.random() * 0.3, 7, 5);
      mesh = new THREE.Mesh(geo, mat);
      mesh.scale.y = 0.6 + Math.random() * 0.3;
    } else {
      // soft coral fan: a flat blade that sways like kelp, but low and wide
      const geo = new THREE.PlaneGeometry(0.5 + Math.random() * 0.4, 0.4 + Math.random() * 0.3, 1, 1);
      geo.translate(0, (0.4 + Math.random() * 0.3) / 2, 0);
      mesh = new THREE.Mesh(geo, mat);
      mesh.material = mat.clone();
      mesh.material.side = THREE.DoubleSide;
      reefSway.push({ mesh, phase: Math.random() * Math.PI * 2, speed: 0.6 + Math.random() * 0.4 });
    }
    mesh.position.set(x, baseY, z);
    mesh.rotation.y = Math.random() * Math.PI * 2;
    reefGroup.add(mesh);
  }
}

makeReef(20, -22, 11);
makeReef(26, -40, 9);

// ---------- anemones: the reef's second variety, distinct from every coral shape ----------
// The last open item from visit 4's "reef could grow a second variety — anemones,
// small darting fish distinct from the main school" (the darting-fish half closed
// at visit 10). Every existing coral piece is either one rigid solid (branching,
// boulder) or one swaying blade (the soft fan) — an anemone is neither: a squat
// bulbous base with many thin tentacles that each sway on their own independent
// phase, so a single head reads as several small waving parts, not one shape
// swaying as a whole. That per-tentacle independence is the actual distinguishing
// behavior, not just a new silhouette.
const anemoneColors = [0xe488b0, 0xb08ee8, 0xcdead2];
const anemoneMats = anemoneColors.map(
  (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.7, flatShading: true, fog: true })
);
const anemoneTentacles = [];
function makeAnemones(centerX, centerZ, spread, count) {
  for (let i = 0; i < count; i++) {
    const x = centerX + (Math.random() - 0.5) * spread * 0.85;
    const z = centerZ + (Math.random() - 0.5) * spread * 0.55;
    const baseY = floorHeightAt(x, z);
    const mat = anemoneMats[(Math.random() * anemoneMats.length) | 0];

    const group = new THREE.Object3D();
    group.position.set(x, baseY, z);
    scene.add(group);

    // bulbous base, half-buried in the rock/sand like the coral pieces above it
    const baseRadius = 0.22 + Math.random() * 0.12;
    const base = new THREE.Mesh(new THREE.SphereGeometry(baseRadius, 8, 6), mat);
    base.scale.y = 0.55;
    group.add(base);

    // a ring of thin tentacles splaying outward and up from the base, each
    // swaying on its own phase — the piece's whole point, so no two tentacles
    // ever move in lockstep even on the same head
    const tentacleCount = 9 + ((Math.random() * 5) | 0);
    for (let tI = 0; tI < tentacleCount; tI++) {
      const angle = (tI / tentacleCount) * Math.PI * 2 + Math.random() * 0.3;
      const len = 0.35 + Math.random() * 0.25;
      const tentacle = new THREE.Mesh(new THREE.ConeGeometry(0.035, len, 4), mat);
      tentacle.position.set(Math.cos(angle) * baseRadius * 0.7, baseRadius * 0.35, Math.sin(angle) * baseRadius * 0.7);
      tentacle.rotation.z = Math.cos(angle) * 0.5;
      tentacle.rotation.x = -Math.sin(angle) * 0.5;
      group.add(tentacle);
      anemoneTentacles.push({
        mesh: tentacle,
        baseRotZ: tentacle.rotation.z,
        baseRotX: tentacle.rotation.x,
        phase: Math.random() * Math.PI * 2,
        speed: 0.9 + Math.random() * 0.6,
      });
    }
  }
}
makeAnemones(20, -22, 11, 4);
makeAnemones(26, -40, 9, 3);

// ---------- wreck: a broken hull resting canted on the slope ----------
// The last item on visit 1's original list. Positioned well past the reef
// (which claims roughly x 14..30) so kelp, reef, and wreck read as three
// distinct places along the swim-forward path, not a cluster near spawn.
// Static, like the reef — no per-frame animation, just floorHeightAt-bedded
// placement reused directly from that same approach.
const hullMat = new THREE.MeshStandardMaterial({ color: 0x362c20, roughness: 0.95, metalness: 0.35, flatShading: true, fog: true });
const hullMat2 = new THREE.MeshStandardMaterial({ color: 0x463823, roughness: 0.95, metalness: 0.3, flatShading: true, fog: true });
const ribMat = new THREE.MeshStandardMaterial({ color: 0x201a12, roughness: 1, metalness: 0.2, flatShading: true, fog: true });
const debrisMat = new THREE.MeshStandardMaterial({ color: 0x2a2317, roughness: 1, metalness: 0.15, flatShading: true, fog: true });

function jitterGeo(geo, amount) {
  const pos = geo.attributes.position;
  for (let v = 0; v < pos.count; v++) {
    pos.setXYZ(
      v,
      pos.getX(v) + (Math.random() - 0.5) * amount,
      pos.getY(v) + (Math.random() - 0.5) * amount,
      pos.getZ(v) + (Math.random() - 0.5) * amount
    );
  }
  geo.computeVertexNormals();
  return geo;
}

function makeWreck(centerX, centerZ) {
  const wreckGroup = new THREE.Object3D();
  scene.add(wreckGroup);
  const baseY = floorHeightAt(centerX, centerZ);

  // main hull: a long, battered cylinder lying on its side and listing
  const hullGeo = jitterGeo(new THREE.CylinderGeometry(1.1, 2.1, 14, 9, 3, false), 0.18);
  const hull = new THREE.Mesh(hullGeo, hullMat);
  hull.rotation.z = Math.PI / 2 + 0.3; // on its side
  hull.rotation.y = 0.35; // yawed off the swim axis
  hull.position.set(centerX - 3, baseY + 2.0, centerZ);
  wreckGroup.add(hull);

  // stern: broken free a short distance off, canted at a sharper angle
  const sternGeo = jitterGeo(new THREE.CylinderGeometry(1.5, 0.8, 6.5, 8, 2, false), 0.16);
  const stern = new THREE.Mesh(sternGeo, hullMat2);
  stern.rotation.z = Math.PI / 2 + 0.75;
  stern.rotation.y = -0.5;
  const sternX = centerX + 8, sternZ = centerZ + 3.5;
  stern.position.set(sternX, floorHeightAt(sternX, sternZ) + 1.5, sternZ);
  wreckGroup.add(stern);

  // ribs: bare frame arcs where the plating has rotted through, along the hull
  for (let i = 0; i < 5; i++) {
    const rib = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.08, 5, 10, Math.PI * 1.15), ribMat);
    const x = centerX - 7 + i * 1.7;
    rib.position.set(x, baseY + 2.0, centerZ);
    rib.rotation.x = Math.PI / 2;
    rib.rotation.z = Math.PI * 0.22 + (Math.random() - 0.5) * 0.15;
    wreckGroup.add(rib);
  }

  // scattered debris: crates around the hull, a fallen mast/pipe alongside
  for (let i = 0; i < 6; i++) {
    const x = centerX + (Math.random() - 0.5) * 16;
    const z = centerZ + (Math.random() - 0.5) * 10 + 2;
    const y = floorHeightAt(x, z);
    const size = 0.5 + Math.random() * 0.5;
    const crate = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), debrisMat);
    crate.position.set(x, y + size / 2, z);
    crate.rotation.y = Math.random() * Math.PI;
    crate.rotation.x = (Math.random() - 0.5) * 0.3;
    wreckGroup.add(crate);
  }

  const mastX = centerX + 4, mastZ = centerZ - 5;
  const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 9, 6), hullMat2);
  mast.position.set(mastX, floorHeightAt(mastX, mastZ) + 0.2, mastZ);
  mast.rotation.z = Math.PI / 2 + 0.2;
  mast.rotation.y = 0.9;
  wreckGroup.add(mast);

  wreckGlowLight = makeGlowMotes(centerX, centerZ, baseY);
}

// bioluminescence inside the hull — visit 5's open thread on what
// "distinguishes inside from outside" in the wreck. Motes sit along the same
// x-line as the rib arcs above, so the glow is glimpsed through the gaps in
// the plating rather than lighting the open water around the hull.
const glowColors = [0x2effc9, 0x1dd9a3, 0x35c9ff];
const glowMotes = [];
let wreckGlowLight = null;
// the wreck's own position for visit 29's named next step ("the wreck's
// interior glow motes calling for a low groan") — set once here since the
// hull never moves, unlike the wanderer's panner which tick() has to keep
// current every frame.
let wreckGlowPos = null;
function makeGlowMotes(centerX, centerZ, baseY) {
  const MOTE_COUNT = 14;
  for (let i = 0; i < MOTE_COUNT; i++) {
    const x = centerX - 7 + Math.random() * 6.5; // along the rib line
    const y = baseY + 1.4 + Math.random() * 1.7; // inside the hull's cross-section
    const z = centerZ + (Math.random() - 0.5) * 1.6;
    const color = glowColors[(Math.random() * glowColors.length) | 0];
    const mat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      fog: true,
    });
    const size = 0.05 + Math.random() * 0.05;
    const mote = new THREE.Mesh(new THREE.SphereGeometry(size, 6, 5), mat);
    mote.position.set(x, y, z);
    scene.add(mote);
    glowMotes.push({
      mesh: mote,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 0.5,
      baseOpacity: 0.3 + Math.random() * 0.3,
      driftPhase: Math.random() * Math.PI * 2,
    });
  }
  // a dim light glimpsed through the broken ribs, not lighting the open water
  const light = new THREE.PointLight(0x2effc9, 0.9, 6, 2);
  light.position.set(centerX - 4, baseY + 2.2, centerZ);
  scene.add(light);
  wreckGlowPos = light.position.clone();
  return light;
}

makeWreck(42, -34);

// ---------- a second debris trail, leading away from the wreck ----------
// The last of visit 5's three "interior life" ideas for the wreck (the other
// two — bioluminescence, sheltering fish — were taken by visits 7 and 8).
// Not more life inside the hull this time: evidence of how the wreck got
// here. A scatter of barrels and broken planking trailing off past the
// stern, the way real wreckage drags and spills as a hull goes down and
// settles unevenly. Reuses the reef/wreck pattern directly — an unrotated
// container with children at absolute world coordinates, bedded via
// floorHeightAt, no animation.
const barrelMat = new THREE.MeshStandardMaterial({ color: 0x3a2c1a, roughness: 0.9, metalness: 0.1, flatShading: true, fog: true });
const plankMat = new THREE.MeshStandardMaterial({ color: 0x241c12, roughness: 1, metalness: 0.05, flatShading: true, fog: true });

function makeDebrisTrail(startX, startZ, dirX, dirZ, count) {
  const len = Math.hypot(dirX, dirZ);
  const ux = dirX / len, uz = dirZ / len;
  const perpX = -uz, perpZ = ux;
  const trailGroup = new THREE.Object3D();
  scene.add(trailGroup);
  for (let i = 0; i < count; i++) {
    // spacing and scatter both grow with distance, so the trail thins and
    // widens the further it gets from the wreck rather than reading as a
    // straight, evenly-spaced line
    const dist = 4 + i * 2.4 + Math.random() * 1.5;
    const drift = (Math.random() - 0.5) * (1.5 + i * 0.9);
    const x = startX + ux * dist + perpX * drift;
    const z = startZ + uz * dist + perpZ * drift;
    const y = floorHeightAt(x, z);
    // pieces read slightly smaller the further they've scattered
    const scale = Math.max(0.4, 1 - i / (count + 1));

    if (Math.random() < 0.45) {
      // a barrel — some still upright, most toppled at odd angles
      const r = (0.28 + Math.random() * 0.12) * scale;
      const h = (0.7 + Math.random() * 0.25) * scale;
      const barrel = new THREE.Mesh(jitterGeo(new THREE.CylinderGeometry(r, r, h, 8), r * 0.12), barrelMat);
      const toppled = Math.random() < 0.6;
      barrel.position.set(x, y + (toppled ? r : h * 0.45), z);
      barrel.rotation.set(
        toppled ? Math.PI / 2 + (Math.random() - 0.5) * 0.4 : (Math.random() - 0.5) * 0.25,
        Math.random() * Math.PI,
        (Math.random() - 0.5) * 0.3
      );
      trailGroup.add(barrel);
    } else {
      // a broken plank, flat on the seabed
      const w = (0.9 + Math.random() * 0.8) * scale;
      const plank = new THREE.Mesh(jitterGeo(new THREE.BoxGeometry(w, 0.08 * scale, 0.28 * scale), 0.03), plankMat);
      plank.position.set(x, y + 0.05 * scale, z);
      plank.rotation.y = Math.random() * Math.PI;
      plank.rotation.x = (Math.random() - 0.5) * 0.2;
      plank.rotation.z = (Math.random() - 0.5) * 0.2;
      trailGroup.add(plank);
    }
  }
}

// ---------- fish: a school that schools, and scatters when approached ----------
const fishColors = [0xb9d9d2, 0x8fc7c9, 0x6fa8ab, 0xd7e8d4];
const fishMats = fishColors.map(
  (c) =>
    new THREE.MeshStandardMaterial({ color: c, roughness: 0.7, metalness: 0.05, flatShading: true, fog: true })
);

function makeFishMesh(mat) {
  const group = new THREE.Object3D();
  const body = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.5, 5), mat);
  body.rotation.x = -Math.PI / 2; // tip points along -Z (forward)
  group.add(body);
  const tail = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.22), mat);
  tail.position.z = 0.32;
  group.userData.tail = tail;
  group.add(tail);
  return group;
}

// Boid schools share this one update, parameterized per school so a calmer,
// tighter-radius school (the wreck's sheltering fish, added this visit) can
// reuse the same flocking math as the open-water school without duplicating it.
function makeSchool({ count, home, homeRadius, homeSpring, homePullBeyond, perception, sepDist, fleeRadius, maxSpeed, minSpeed, drag, colors }) {
  const mats = colors.map(
    (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.7, metalness: 0.05, flatShading: true, fog: true })
  );
  const fish = [];
  for (let i = 0; i < count; i++) {
    const mat = mats[i % mats.length];
    const mesh = makeFishMesh(mat);
    const pos = home.clone().add(
      new THREE.Vector3((Math.random() - 0.5) * homeRadius, (Math.random() - 0.5) * homeRadius * 0.6, (Math.random() - 0.5) * homeRadius)
    );
    mesh.position.copy(pos);
    scene.add(mesh);
    fish.push({
      mesh,
      pos,
      vel: new THREE.Vector3((Math.random() - 0.5), 0, (Math.random() - 0.5)).setLength(minSpeed),
      wagPhase: Math.random() * Math.PI * 2,
      wagSpeed: 6 + Math.random() * 2,
    });
  }
  return { fish, home, homeRadius, homeSpring, homePullBeyond, perception, sepDist, fleeRadius, maxSpeed, minSpeed, drag };
}

// ---------- reef darters: small, individually skittish fish among the coral ----------
// Two open threads meet here: visit 4's "reef could grow a second variety —
// anemones, small darting fish distinct from the main school" and visit 3's
// "a second, smaller/skittish school elsewhere in the water column" (the
// wreck's shelter school, added by visit 8, was explicitly not this — that
// one still schools as a group). A darter is the genuine distinct behavior:
// no cohesion/alignment with neighbors at all, just an individual hovering
// near one coral head that darts to a new nearby point on its own timer, or
// flees the swimmer in a single quick burst — the "individual, not a group"
// shape visit 3 was asking for, not another boid flock with different knobs.
const darterColors = [0xff8a3d, 0xffce4a, 0x2f8fd6];
const darterMats = darterColors.map(
  (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.6, metalness: 0.05, flatShading: true, fog: true })
);

const reefDarters = [];
function makeReefDarters(centerX, centerZ, spread, count) {
  for (let i = 0; i < count; i++) {
    const homeX = centerX + (Math.random() - 0.5) * spread * 0.8;
    const homeZ = centerZ + (Math.random() - 0.5) * spread * 0.5;
    const homeY = floorHeightAt(homeX, homeZ) + 0.6 + Math.random() * 1.4;
    const mat = darterMats[(Math.random() * darterMats.length) | 0];
    const mesh = makeFishMesh(mat);
    mesh.scale.setScalar(0.5 + Math.random() * 0.15); // noticeably smaller than either school's fish
    const home = new THREE.Vector3(homeX, homeY, homeZ);
    mesh.position.copy(home);
    scene.add(mesh);
    reefDarters.push({
      mesh,
      home,
      pos: home.clone(),
      vel: new THREE.Vector3(),
      target: home.clone(),
      wagPhase: Math.random() * Math.PI * 2,
      wagSpeed: 10 + Math.random() * 3, // faster, nervier tail-beat than a school fish
      nextDart: Math.random() * 3,
    });
  }
}
// Both reef clusters (visit 4's makeReef centers below) get their own darters,

makeReefDarters(20, -22, 11, 7);
makeReefDarters(26, -40, 9, 6);

const _darterSteer = new THREE.Vector3();
const _darterFlee = new THREE.Vector3();
const DARTER_TETHER = 2.2; // how far from home coral a single dart may reach
const DARTER_SPEED = 3.4;
const DARTER_SPOOK_RADIUS = 2.6;

function updateReefDarters(dt, t, swimmerPos) {
  for (const d of reefDarters) {
    d.nextDart -= dt;
    const distToSwimmer = d.pos.distanceTo(swimmerPos);

    if (distToSwimmer < DARTER_SPOOK_RADIUS) {
      // flee dart: one quick burst away from the swimmer, still tethered near home
      _darterFlee.copy(d.pos).sub(swimmerPos).setLength(DARTER_TETHER);
      d.target.copy(d.home).add(_darterFlee);
      d.nextDart = 0.4 + Math.random() * 0.4; // ready to dart again right away if still spooked
    } else if (d.nextDart <= 0) {
      // idle dart: an unprompted short hop to a new point near home, the way
      // a damselfish never strays from the one coral head it's claimed
      d.target
        .copy(d.home)
        .add(
          new THREE.Vector3(
            (Math.random() - 0.5) * DARTER_TETHER,
            (Math.random() - 0.5) * DARTER_TETHER * 0.5,
            (Math.random() - 0.5) * DARTER_TETHER
          )
        );
      d.nextDart = 1.5 + Math.random() * 2.5;
    }

    // move toward the current target in one quick burst, then hold — no
    // continuous neighbor-following math, which is exactly what makes this
    // read as one fish's own decision instead of a school's shared motion
    _darterSteer.copy(d.target).sub(d.pos);
    const distToTarget = _darterSteer.length();
    if (distToTarget > 0.05) {
      _darterSteer.setLength(Math.min(DARTER_SPEED, distToTarget * 8));
      d.vel.lerp(_darterSteer, Math.min(1, dt * 10));
    } else {
      d.vel.multiplyScalar(Math.max(0, 1 - dt * 6));
    }
    d.pos.addScaledVector(d.vel, dt);

    const floorY = floorHeightAt(d.pos.x, d.pos.z) + 0.3;
    if (d.pos.y < floorY) d.pos.y = floorY;

    d.mesh.position.copy(d.pos);
    if (d.vel.lengthSq() > 0.01) {
      d.mesh.rotation.y = Math.atan2(d.vel.x, d.vel.z) + Math.PI;
    }
    d.mesh.userData.tail.rotation.y = Math.sin(t * d.wagSpeed + d.wagPhase) * 0.7;
  }
}

const _sep = new THREE.Vector3();
const _cohere = new THREE.Vector3();
const _align = new THREE.Vector3();
const _flee = new THREE.Vector3();
const _toHome = new THREE.Vector3();
const _steer = new THREE.Vector3();

function updateSchool(school, dt, t, swimmerPos) {
  const { fish, home, homeRadius, homeSpring, homePullBeyond, perception, sepDist, fleeRadius, maxSpeed, minSpeed, drag } = school;
  for (let i = 0; i < fish.length; i++) {
    const f = fish[i];
    _sep.set(0, 0, 0);
    _cohere.set(0, 0, 0);
    _align.set(0, 0, 0);
    let neighbors = 0;

    for (let j = 0; j < fish.length; j++) {
      if (i === j) continue;
      const o = fish[j];
      const d = f.pos.distanceTo(o.pos);
      if (d < perception) {
        _cohere.add(o.pos);
        _align.add(o.vel);
        neighbors++;
        if (d < sepDist && d > 1e-4) {
          _steer.copy(f.pos).sub(o.pos).divideScalar(d * d);
          _sep.add(_steer);
        }
      }
    }

    _steer.set(0, 0, 0);
    if (neighbors > 0) {
      _cohere.divideScalar(neighbors).sub(f.pos).multiplyScalar(0.9);
      _align.divideScalar(neighbors).multiplyScalar(0.7);
      _steer.add(_cohere).add(_align);
    }
    _steer.add(_sep.multiplyScalar(2.4));

    // scatter: flee the swimmer when it's close, harder the closer it gets
    const distToSwimmer = f.pos.distanceTo(swimmerPos);
    if (distToSwimmer < fleeRadius) {
      _flee.copy(f.pos).sub(swimmerPos);
      const strength = (1 - distToSwimmer / fleeRadius) * 9;
      _flee.setLength(strength);
      _steer.add(_flee);
    }

    // always drift gently toward the home volume; pull harder once scattered past it
    _toHome.copy(home).sub(f.pos);
    const homeDist = _toHome.length();
    const homePull = homeDist > homeRadius ? (homeDist - homeRadius) * homePullBeyond : homeDist * homeSpring;
    _toHome.setLength(homePull);
    _steer.add(_toHome);

    _steer.addScaledVector(f.vel, -drag);
    f.vel.addScaledVector(_steer, dt);
    if (f.vel.length() > maxSpeed) f.vel.setLength(maxSpeed);
    else if (f.vel.length() < minSpeed) f.vel.setLength(minSpeed); // fish don't idle in place

    f.pos.addScaledVector(f.vel, dt);

    // stay clear of the floor and the surface
    const floorY = floorHeightAt(f.pos.x, f.pos.z) + 0.5;
    if (f.pos.y < floorY) f.pos.y = floorY;
    if (f.pos.y > 6) f.pos.y = 6;

    f.mesh.position.copy(f.pos);
    f.mesh.rotation.y = Math.atan2(f.vel.x, f.vel.z) + Math.PI;
    f.mesh.rotation.x = -Math.asin(Math.max(-1, Math.min(1, f.vel.y / Math.max(f.vel.length(), 0.001))));
    f.mesh.userData.tail.rotation.y = Math.sin(t * f.wagSpeed + f.wagPhase) * 0.6;
  }
}

// ---------- ambient sound: the fifth depth-response axis ----------
// Visits 22-25 made light, fog, current, and marine snow all answer to the
// swimmer's own depth; sound never got touched at all — a whole sense the
// seed's "be underwater" ask implies but nothing here has voiced yet. Built
// procedurally (a filtered noise loop, no fetched asset) for the same reason
// visit 1 vendored three.js instead of a CDN import: the door has to open
// with zero network access. Started from the same click that requests
// pointer lock, since Web Audio needs a genuine user gesture to unsuspend —
// requestPointerLock() itself doesn't count as playing audio, so this can't
// piggyback on it silently, it has to be its own explicit start call inside
// the same handler.
let audioCtx = null, ambientFilter = null, wandererPanner = null, wreckPanner = null;
function initAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  audioCtx = new Ctx();

  // brown noise, looped: a dull, enveloping rumble rather than white noise's
  // flat hiss — reads as "current pressing past you", not "radio static"
  const bufSize = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < bufSize; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + 0.02 * white) / 1.02;
    data[i] = last * 3.5;
  }
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = noiseBuf;
  noiseSrc.loop = true;

  ambientFilter = audioCtx.createBiquadFilter();
  ambientFilter.type = 'lowpass';
  ambientFilter.frequency.value = 500;

  const ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0.05;

  noiseSrc.connect(ambientFilter).connect(ambientGain).connect(audioCtx.destination);
  noiseSrc.start();

  scheduleBubble();

  // the wanderer's own voice: visit 28 gave the water an ear but left the one
  // thing worth actually hearing silent — "the wanderer passing nearby
  // currently makes no sound of its own." A real PannerNode (not the flat,
  // unpositioned gain the ambient/bubble sounds use) rooted at the wanderer's
  // own position, so the call genuinely comes from where the shape is, and
  // fades with distance the way visit 12's orbit-vs-waypoint math already
  // established the *sight* of it does. Positioned once here at whatever the
  // wanderer's position happens to be at the moment audio starts; tick()
  // keeps it — and the listener — current every frame after that.
  wandererPanner = audioCtx.createPanner();
  wandererPanner.panningModel = 'equalpower';
  wandererPanner.distanceModel = 'inverse';
  wandererPanner.refDistance = 8;
  wandererPanner.rolloffFactor = 1.3;
  wandererPanner.maxDistance = 70;
  setPannerPosition(wandererPanner, wanderer.position);
  wandererPanner.connect(audioCtx.destination);

  scheduleWandererCall();

  // the wreck's own voice, visit 29's own named next step: "the wreck's
  // interior glow motes calling for a low groan." Reuses the wandererPanner
  // infrastructure (visit 29's own note that it's "generic enough... to
  // reuse directly") but for a fixed point rather than a moving one — the
  // hull never moves, so unlike wandererPanner this position is set once,
  // here, and never touched again in tick(). A tighter refDistance/
  // maxDistance than the wanderer's own call, since this is a small,
  // localized structural sound (something creaking deep inside a hull),
  // not a large animal's call carrying across open water.
  if (wreckGlowPos) {
    wreckPanner = audioCtx.createPanner();
    wreckPanner.panningModel = 'equalpower';
    wreckPanner.distanceModel = 'inverse';
    wreckPanner.refDistance = 4;
    wreckPanner.rolloffFactor = 1.6;
    wreckPanner.maxDistance = 35;
    setPannerPosition(wreckPanner, wreckGlowPos);
    wreckPanner.connect(audioCtx.destination);
    scheduleWreckGroan();
  }
}

// AudioParam-based positioning (positionX/Y/Z) is the current spec; fall back
// to the deprecated setPosition() call for any engine that still needs it —
// same defensive shape as every other browser-surface check in this file.
function setPannerPosition(node, pos) {
  if (node.positionX) {
    node.positionX.value = pos.x;
    node.positionY.value = pos.y;
    node.positionZ.value = pos.z;
  } else {
    node.setPosition(pos.x, pos.y, pos.z);
  }
}

// occasional bubbles: a short rising sine chirp, irregularly spaced so they
// never read as a metronome
function playBubble() {
  const dur = 0.12 + Math.random() * 0.15;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  const startFreq = 900 + Math.random() * 500;
  osc.frequency.setValueAtTime(startFreq, now);
  osc.frequency.exponentialRampToValueAtTime(startFreq * 1.8, now + dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.05, now + dur * 0.3);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + dur + 0.05);
}
function scheduleBubble() {
  const delay = 2.5 + Math.random() * 5;
  setTimeout(() => {
    if (!audioCtx) return;
    playBubble();
    scheduleBubble();
  }, delay * 1000);
}

// a low, slow call with a downward glide — the "moan" register real distant
// marine sound has, not another chirp. Routed through wandererPanner (not
// straight to destination like the ambient/bubble sounds) so refDistance/
// rolloffFactor do the fading-with-distance work instead of a hand-rolled
// gain formula; kept intentionally spaced out and irregular, same
// scheduling shape as scheduleBubble, so it reads as an animal calling on
// its own schedule, not a location-marker beacon.
function playWandererCall() {
  const dur = 1.8 + Math.random() * 1.0;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  const startFreq = 48 + Math.random() * 14;
  osc.frequency.setValueAtTime(startFreq, now);
  osc.frequency.exponentialRampToValueAtTime(startFreq * 0.72, now + dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.6, now + dur * 0.35);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g).connect(wandererPanner);
  osc.start(now);
  osc.stop(now + dur + 0.05);
}
function scheduleWandererCall() {
  const delay = 9 + Math.random() * 10;
  setTimeout(() => {
    if (!audioCtx) return;
    playWandererCall();
    scheduleWandererCall();
  }, delay * 1000);
}

// the hull settling under its own weight, not an animal calling — lower and
// longer than the wanderer's own call, and two slightly-detuned oscillators
// instead of one so it beats faintly, the metallic-groan texture a single
// sine can't give. Routed through wreckPanner, not straight to destination,
// so it's only ever heard as coming from inside the wreck. Spaced out far
// more irregularly and rarely than the wanderer's call (which reads as a
// living thing checking in on its own schedule) — a hull groan should feel
// like an occasional, half-noticed event, not a heartbeat.
function playWreckGroan() {
  const dur = 3 + Math.random() * 2;
  const now = audioCtx.currentTime;
  const startFreq = 32 + Math.random() * 8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.5, now + dur * 0.4);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  g.connect(wreckPanner);
  for (const detune of [1, 1.015]) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(startFreq * detune, now);
    osc.frequency.exponentialRampToValueAtTime(startFreq * detune * 0.85, now + dur);
    osc.connect(g);
    osc.start(now);
    osc.stop(now + dur + 0.05);
  }
}
function scheduleWreckGroan() {
  const delay = 20 + Math.random() * 25;
  setTimeout(() => {
    if (!audioCtx) return;
    playWreckGroan();
    scheduleWreckGroan();
  }, delay * 1000);
}

// same NEUTRAL/SURFACE/ABYSS band every other depth-response function in
// this file uses, so the ear and the eye change together, not on their own
// separate schedules — clearer, more open near the surface (higher cutoff);
// duller, more muffled toward the abyss (lower cutoff), same direction the
// light and fog already move in
function depthSoundFactor(y) {
  const NEUTRAL_HI = 2, NEUTRAL_LO = -8, SURFACE_Y = 8, ABYSS_Y = -20;
  if (y > NEUTRAL_HI) {
    return 1 + Math.min(1, (y - NEUTRAL_HI) / (SURFACE_Y - NEUTRAL_HI)) * 0.8;
  }
  if (y < NEUTRAL_LO) {
    return 1 - Math.min(1, (NEUTRAL_LO - y) / (NEUTRAL_LO - ABYSS_Y)) * 0.7;
  }
  return 1;
}

const clock = new THREE.Clock();
const forward = new THREE.Vector3();
const right = new THREE.Vector3();
const worldUp = new THREE.Vector3(0, 1, 0);

function resize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
addEventListener('resize', resize);

function tick() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  yaw.rotation.y = yawAngle;
  pitch.rotation.x = pitchAngle;

  forward.set(0, 0, -1).applyEuler(new THREE.Euler(pitchAngle, yawAngle, 0, 'YXZ'));
  right.set(1, 0, 0).applyAxisAngle(worldUp, yawAngle);

  accel.set(0, 0, 0);
  if (keys.KeyW) accel.addScaledVector(forward, THRUST);
  if (keys.KeyS) accel.addScaledVector(forward, -THRUST);
  if (keys.KeyD) accel.addScaledVector(right, THRUST);
  if (keys.KeyA) accel.addScaledVector(right, -THRUST);
  if (keys.Space) accel.y += THRUST;
  if (keys.ShiftLeft || keys.ShiftRight || keys.KeyC) accel.y -= THRUST;

  // water drag opposes velocity — gives the lag/drift the seed asks for
  accel.addScaledVector(velocity, -DRAG);
  velocity.addScaledVector(accel, dt);
  if (velocity.length() > MAX_SPEED) velocity.setLength(MAX_SPEED);

  yaw.position.addScaledVector(velocity, dt);

  // gentle current sway, like being nudged even when still — scaled by
  // depth so the nudge itself grows near the surface and stills near the
  // abyss floor, same as the light and fog it swims through
  const cf = depthCurrentFactor(yaw.position.y);
  yaw.position.x += Math.sin(t * 0.13) * 0.0025 * cf;
  yaw.position.y += Math.sin(t * 0.21 + 1.7) * 0.0015 * cf;

  // keep the swimmer below the surface and clear of freefall into the abyss
  if (yaw.position.y > 8) yaw.position.y = 8;
  if (yaw.position.y < -20) yaw.position.y = -20;

  const lf = depthLightFactor(yaw.position.y);
  sun.intensity = SUN_BASE * lf;
  fill.intensity = FILL_BASE * lf;
  glow.intensity = GLOW_BASE * lf;

  const ff = depthFogFactor(yaw.position.y);
  scene.fog.density = FOG_BASE_DENSITY * ff.density;
  fogColor.copy(fogColorNeutral).lerp(ff.target, ff.t);
  scene.fog.color.copy(fogColor);

  if (ambientFilter) {
    const sf = depthSoundFactor(yaw.position.y);
    ambientFilter.frequency.setTargetAtTime(500 * sf, audioCtx.currentTime, 0.3);
  }

  // subtle roll into turns for a swimming, not walking, feel
  pitch.rotation.z += ((-velocity.dot(right) * 0.05) - pitch.rotation.z) * Math.min(1, dt * 4);

  for (const s of shafts) {
    s.rotation.z = Math.sin(t * 0.15 + s.userData.sway) * 0.05;
  }

  for (const stalk of kelpStalks) {
    const { segments, phase, speed } = stalk;
    for (let i = 0; i < segments.length; i++) {
      const bend = 0.06 + (i / segments.length) * 0.16;
      segments[i].rotation.z = Math.sin(t * speed + phase + i * 0.7) * bend;
      segments[i].rotation.x = Math.sin(t * speed * 0.8 + phase + i * 0.9) * bend * 0.5;
    }
  }

  for (const s of reefSway) {
    s.mesh.rotation.z = Math.sin(t * s.speed + s.phase) * 0.18;
  }

  for (const a of anemoneTentacles) {
    a.mesh.rotation.z = a.baseRotZ + Math.sin(t * a.speed + a.phase) * 0.22;
    a.mesh.rotation.x = a.baseRotX + Math.cos(t * a.speed * 0.8 + a.phase) * 0.15;
  }

  // last item on visit 23's depth-response list: marine snow has drifted at a
  // flat rate since visit 1, unresponsive to depth like light/fog/current all
  // were before visits 22-24 closed those gaps. Reuses depthCurrentFactor
  // as-is (no new function) — each particle's *own* y stands in for the
  // swimmer's y in that formula, since it's the particle's own depth in the
  // water that should decide whether it's caught in wave-driven surface
  // turbulence or settled into stiller deep water, not wherever the swimmer
  // happens to be.
  const pp = particleGeo.attributes.position;
  for (let i = 0; i < PARTICLES; i++) {
    const seed = particleSeed[i];
    const pf = depthCurrentFactor(pp.array[i * 3 + 1]);
    pp.array[i * 3 + 1] += (Math.sin(t * 0.3 + seed) * 0.0015 + 0.0015) * pf;
    pp.array[i * 3 + 0] += Math.sin(t * 0.2 + seed * 1.3) * 0.0008 * pf;
    if (pp.array[i * 3 + 1] > 20) pp.array[i * 3 + 1] = -20;
  }
  pp.needsUpdate = true;

  updateSchool(mainSchool, dt, t, yaw.position);
  updateSchool(shelterSchool, dt, t, yaw.position);
  updateReefDarters(dt, t, yaw.position);

  for (const m of glowMotes) {
    const pulse = Math.sin(t * m.speed + m.phase) * 0.5 + 0.5;
    m.mesh.material.opacity = Math.min(1, m.baseOpacity + pulse * 0.5);
    m.mesh.position.y += Math.sin(t * 0.3 + m.driftPhase) * 0.0006;
  }
  if (wreckGlowLight) {
    wreckGlowLight.intensity = 0.5 + (Math.sin(t * 0.6) * 0.5 + 0.5) * 0.6;
  }

  wandererT += dt * 0.04;
  wanderer.position.x = Math.sin(wandererT) * 40 - 10;
  wanderer.position.z = -70 + Math.cos(wandererT * 0.7) * 28;
  wanderer.rotation.y = -wandererT - Math.PI / 2;
  flukePivot.rotation.x = Math.sin(t * 1.1 - WANDERER_TAIL_Z * WANDERER_WAVE_K) * 0.35;

  // keep the wanderer's voice rooted at the wanderer and the listener rooted
  // at the swimmer, every frame — both drift constantly, so a position set
  // once at initAudio() time would silently go stale the moment either moved
  if (wandererPanner) setPannerPosition(wandererPanner, wanderer.position);
  if (audioCtx) {
    const listener = audioCtx.listener;
    if (listener.positionX) {
      listener.positionX.value = yaw.position.x;
      listener.positionY.value = yaw.position.y;
      listener.positionZ.value = yaw.position.z;
      listener.forwardX.value = forward.x;
      listener.forwardY.value = forward.y;
      listener.forwardZ.value = forward.z;
      listener.upX.value = 0;
      listener.upY.value = 1;
      listener.upZ.value = 0;
    } else {
      listener.setPosition(yaw.position.x, yaw.position.y, yaw.position.z);
      listener.setOrientation(forward.x, forward.y, forward.z, 0, 1, 0);
    }
  }

  {
    const bp = wandererBody.geometry.attributes.position;
    const span = WANDERER_TAIL_Z - WANDERER_NOSE_Z;
    for (let v = 0; v < bp.count; v++) {
      const bx = wandererBodyBase[v * 3];
      const by = wandererBodyBase[v * 3 + 1];
      const bz = wandererBodyBase[v * 3 + 2];
      const s = Math.max(0, Math.min(1, (bz - WANDERER_NOSE_Z) / span));
      const amp = WANDERER_AMP * s * s; // grows toward the tail, still at the nose
      const offset = amp * Math.sin(t * 1.1 - bz * WANDERER_WAVE_K);
      bp.setXYZ(v, bx + offset, by, bz);
    }
    bp.needsUpdate = true;

    // dorsal fin: rigidly mounted on the spine, so it should carry the same
    // lateral offset the undulation gives the flesh at its own mount point
    // instead of standing dead still while the body around it moves — the
    // "worth a look, not needed" item visits 13 and 14 both left open once
    // the body itself got this motion. Same amp/offset formula as the body
    // loop above, evaluated at the fin's single mount z instead of per-vertex.
    const dorsalS = Math.max(0, Math.min(1, (dorsal.position.z - WANDERER_NOSE_Z) / span));
    const dorsalAmp = WANDERER_AMP * dorsalS * dorsalS;
    dorsal.position.x = dorsalAmp * Math.sin(t * 1.1 - dorsal.position.z * WANDERER_WAVE_K);
  }

  depthEl.textContent = `depth ${Math.max(0, Math.round(-yaw.position.y * 3.1))} ft`;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
