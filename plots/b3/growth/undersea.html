<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Undersea</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #01141d; }
  canvas { display: block; }
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: rgba(220, 240, 245, 0.85);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  #hint {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: auto;
    cursor: pointer;
    background: rgba(2, 20, 28, 0.55);
    border: 1px solid rgba(180, 220, 230, 0.25);
    border-radius: 10px;
    padding: 22px 30px;
    backdrop-filter: blur(2px);
  }
  #hint b { font-size: 17px; display: block; margin-bottom: 8px; letter-spacing: 0.03em; }
  #hint .keys { opacity: 0.85; font-size: 13px; }
  #depth {
    position: absolute; left: 16px; bottom: 14px;
    opacity: 0.75;
  }
  #hud.hidden #hint { display: none; }
</style>
</head>
<body>
<div id="hud">
  <div id="hint">
    <b>Undersea</b>
    <div class="keys">click to dive in</div>
    <div class="keys">mouse — look &middot; WASD — swim &middot; space / shift — rise / sink</div>
    <div class="keys">esc — surface</div>
  </div>
  <div id="depth"></div>
</div>
<script type="module">
import * as THREE from './three.module.min.js';

const scene = new THREE.Scene();
const fogColor = new THREE.Color(0x0a3947);
scene.fog = new THREE.FogExp2(fogColor.getHex(), 0.045);
scene.background = fogColor;

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.05, 200);
camera.position.set(0, -2, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ---------- light falling from above ----------
const sun = new THREE.DirectionalLight(0xbfe9ea, 1.4);
sun.position.set(4, 30, -6);
scene.add(sun);

const fill = new THREE.AmbientLight(0x0e4f5c, 0.9);
scene.add(fill);

const glow = new THREE.HemisphereLight(0x6fd3d9, 0x02121a, 0.6);
scene.add(glow);

// god-ray shafts: soft additive planes hanging from the surface, swaying
const shaftMat = new THREE.MeshBasicMaterial({
  color: 0xbfe9ea,
  transparent: true,
  opacity: 0.05,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const shafts = [];
for (let i = 0; i < 10; i++) {
  const w = 1.2 + Math.random() * 1.8;
  const h = 40;
  const geo = new THREE.PlaneGeometry(w, h, 1, 8);
  const mesh = new THREE.Mesh(geo, shaftMat.clone());
  mesh.material.opacity = 0.03 + Math.random() * 0.05;
  mesh.position.set((Math.random() - 0.5) * 50, h / 2 - 15, (Math.random() - 0.5) * 50 - 10);
  mesh.rotation.y = Math.random() * Math.PI;
  mesh.userData.sway = Math.random() * Math.PI * 2;
  scene.add(mesh);
  shafts.push(mesh);
}

// ---------- the floor, sloping away into darkness ----------
const floorGeo = new THREE.PlaneGeometry(160, 220, 60, 80);
floorGeo.rotateX(-Math.PI / 2);
{
  const pos = floorGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    // slope downward with distance, plus gentle undulation
    const slope = -6 - z * 0.35;
    const bump = Math.sin(x * 0.15 + z * 0.08) * 0.6 + Math.sin(x * 0.6 - z * 0.3) * 0.25;
    pos.setY(i, slope + bump);
  }
  floorGeo.computeVertexNormals();
}
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0c3038,
  roughness: 1,
  metalness: 0,
  fog: true,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.z = -60;
scene.add(floor);

// ---------- kelp, swaying on the sloping floor ----------
// The floor's height at any (x, z) is reproducible from the same slope +
// bump formula used to build its geometry above (mesh is at z-offset -60).
function floorHeightAt(x, worldZ) {
  const z = worldZ + 60;
  const slope = -6 - z * 0.35;
  const bump = Math.sin(x * 0.15 + z * 0.08) * 0.6 + Math.sin(x * 0.6 - z * 0.3) * 0.25;
  return slope + bump;
}

const kelpColors = [0x1f5c3a, 0x27703f, 0x184a30, 0x2d6b3a];
const kelpMats = kelpColors.map(
  (c) =>
    new THREE.MeshStandardMaterial({
      color: c,
      roughness: 1,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.88,
      fog: true,
    })
);

const kelpStalks = [];
function makeKelp(baseX, baseZ, height, segCount) {
  const baseY = floorHeightAt(baseX, baseZ);
  const group = new THREE.Object3D();
  group.position.set(baseX, baseY, baseZ);
  group.rotation.y = Math.random() * Math.PI;
  scene.add(group);

  const segLen = height / segCount;
  const baseWidth = 0.45 + Math.random() * 0.35;
  const mat = kelpMats[(Math.random() * kelpMats.length) | 0];

  let parent = group;
  const segments = [];
  for (let i = 0; i < segCount; i++) {
    const w = baseWidth * (1 - (i / segCount) * 0.55);
    const geo = new THREE.PlaneGeometry(w, segLen, 1, 1);
    geo.translate(0, segLen / 2, 0); // pivot at the blade's base, like a hinge
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = i === 0 ? 0 : segLen;
    parent.add(mesh);
    parent = mesh;
    segments.push(mesh);
  }
  kelpStalks.push({ segments, phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 0.3 });
}

// Two loose beds along the swim-forward path, not a uniform grid.
for (let i = 0; i < 11; i++) {
  const x = -9 + Math.random() * 18;
  const z = -18 - Math.random() * 14;
  makeKelp(x, z, 4.5 + Math.random() * 4, 4 + ((Math.random() * 3) | 0));
}
for (let i = 0; i < 9; i++) {
  const x = -22 + Math.random() * 14;
  const z = -42 - Math.random() * 16;
  makeKelp(x, z, 5 + Math.random() * 4.5, 4 + ((Math.random() * 3) | 0));
}

// ---------- reef: a static cluster of rock and coral off to one side ----------
// Kelp claims x -22..9 (roughly, see the two bed loops above); the reef sits
// on the opposite side of the swim-forward path so the two never overlap.
const rockMat = new THREE.MeshStandardMaterial({ color: 0x1a2e33, roughness: 1, flatShading: true, fog: true });
const rockMat2 = new THREE.MeshStandardMaterial({ color: 0x223a40, roughness: 1, flatShading: true, fog: true });
const coralColors = [0xd9704f, 0xc65d8a, 0xdba13a, 0x8a6fc9, 0xd4864f];
const coralMats = coralColors.map(
  (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.85, flatShading: true, fog: true })
);

const reefSway = [];
function makeReef(centerX, centerZ, spread) {
  const reefGroup = new THREE.Object3D();
  scene.add(reefGroup);

  // rock base: irregular boulders bedded into the slope
  const rockCount = 15;
  for (let i = 0; i < rockCount; i++) {
    const x = centerX + (Math.random() - 0.5) * spread;
    const z = centerZ + (Math.random() - 0.5) * spread * 0.7;
    const baseY = floorHeightAt(x, z);
    const scale = 0.7 + Math.random() * 1.6;
    const geo = new THREE.IcosahedronGeometry(scale, 0);
    // knock the vertices around so boulders don't read as perfect icosahedra
    const pos = geo.attributes.position;
    for (let v = 0; v < pos.count; v++) {
      pos.setXYZ(
        v,
        pos.getX(v) + (Math.random() - 0.5) * scale * 0.25,
        pos.getY(v) + (Math.random() - 0.5) * scale * 0.25,
        pos.getZ(v) + (Math.random() - 0.5) * scale * 0.25
      );
    }
    geo.computeVertexNormals();
    const rock = new THREE.Mesh(geo, Math.random() < 0.5 ? rockMat : rockMat2);
    rock.position.set(x, baseY + scale * 0.3, z);
    rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    reefGroup.add(rock);
  }

  // coral: branching (cones), boulder (spheres), and brain (tori) forms
  // planted on top of the rock cluster, plus a few soft fans that sway
  const coralCount = 16;
  for (let i = 0; i < coralCount; i++) {
    const x = centerX + (Math.random() - 0.5) * spread * 0.9;
    const z = centerZ + (Math.random() - 0.5) * spread * 0.6;
    const baseY = floorHeightAt(x, z);
    const mat = coralMats[(Math.random() * coralMats.length) | 0];
    const kind = Math.random();
    let mesh;
    if (kind < 0.4) {
      // branching coral: a cluster of thin cones fanning from one point
      mesh = new THREE.Object3D();
      const branches = 3 + ((Math.random() * 3) | 0);
      for (let b = 0; b < branches; b++) {
        const h = 0.6 + Math.random() * 0.9;
        const branch = new THREE.Mesh(new THREE.ConeGeometry(0.12 + Math.random() * 0.06, h, 5), mat);
        branch.position.y = h / 2;
        branch.rotation.z = (Math.random() - 0.5) * 0.9;
        branch.rotation.x = (Math.random() - 0.5) * 0.9;
        mesh.add(branch);
      }
    } else if (kind < 0.7) {
      // boulder coral: a squat, bumpy sphere
      const geo = new THREE.SphereGeometry(0.35 + Math.random() * 0.3, 7, 5);
      mesh = new THREE.Mesh(geo, mat);
      mesh.scale.y = 0.6 + Math.random() * 0.3;
    } else {
      // soft coral fan: a flat blade that sways like kelp, but low and wide
      const geo = new THREE.PlaneGeometry(0.5 + Math.random() * 0.4, 0.4 + Math.random() * 0.3, 1, 1);
      geo.translate(0, (0.4 + Math.random() * 0.3) / 2, 0);
      mesh = new THREE.Mesh(geo, mat);
      mesh.material = mat.clone();
      mesh.material.side = THREE.DoubleSide;
      reefSway.push({ mesh, phase: Math.random() * Math.PI * 2, speed: 0.6 + Math.random() * 0.4 });
    }
    mesh.position.set(x, baseY, z);
    mesh.rotation.y = Math.random() * Math.PI * 2;
    reefGroup.add(mesh);
  }
}

makeReef(20, -22, 11);
makeReef(26, -40, 9);

// ---------- wreck: a broken hull resting canted on the slope ----------
// The last item on visit 1's original list. Positioned well past the reef
// (which claims roughly x 14..30) so kelp, reef, and wreck read as three
// distinct places along the swim-forward path, not a cluster near spawn.
// Static, like the reef — no per-frame animation, just floorHeightAt-bedded
// placement reused directly from that same approach.
const hullMat = new THREE.MeshStandardMaterial({ color: 0x362c20, roughness: 0.95, metalness: 0.35, flatShading: true, fog: true });
const hullMat2 = new THREE.MeshStandardMaterial({ color: 0x463823, roughness: 0.95, metalness: 0.3, flatShading: true, fog: true });
const ribMat = new THREE.MeshStandardMaterial({ color: 0x201a12, roughness: 1, metalness: 0.2, flatShading: true, fog: true });
const debrisMat = new THREE.MeshStandardMaterial({ color: 0x2a2317, roughness: 1, metalness: 0.15, flatShading: true, fog: true });

function jitterGeo(geo, amount) {
  const pos = geo.attributes.position;
  for (let v = 0; v < pos.count; v++) {
    pos.setXYZ(
      v,
      pos.getX(v) + (Math.random() - 0.5) * amount,
      pos.getY(v) + (Math.random() - 0.5) * amount,
      pos.getZ(v) + (Math.random() - 0.5) * amount
    );
  }
  geo.computeVertexNormals();
  return geo;
}

function makeWreck(centerX, centerZ) {
  const wreckGroup = new THREE.Object3D();
  scene.add(wreckGroup);
  const baseY = floorHeightAt(centerX, centerZ);

  // main hull: a long, battered cylinder lying on its side and listing
  const hullGeo = jitterGeo(new THREE.CylinderGeometry(1.1, 2.1, 14, 9, 3, false), 0.18);
  const hull = new THREE.Mesh(hullGeo, hullMat);
  hull.rotation.z = Math.PI / 2 + 0.3; // on its side
  hull.rotation.y = 0.35; // yawed off the swim axis
  hull.position.set(centerX - 3, baseY + 2.0, centerZ);
  wreckGroup.add(hull);

  // stern: broken free a short distance off, canted at a sharper angle
  const sternGeo = jitterGeo(new THREE.CylinderGeometry(1.5, 0.8, 6.5, 8, 2, false), 0.16);
  const stern = new THREE.Mesh(sternGeo, hullMat2);
  stern.rotation.z = Math.PI / 2 + 0.75;
  stern.rotation.y = -0.5;
  const sternX = centerX + 8, sternZ = centerZ + 3.5;
  stern.position.set(sternX, floorHeightAt(sternX, sternZ) + 1.5, sternZ);
  wreckGroup.add(stern);

  // ribs: bare frame arcs where the plating has rotted through, along the hull
  for (let i = 0; i < 5; i++) {
    const rib = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.08, 5, 10, Math.PI * 1.15), ribMat);
    const x = centerX - 7 + i * 1.7;
    rib.position.set(x, baseY + 2.0, centerZ);
    rib.rotation.x = Math.PI / 2;
    rib.rotation.z = Math.PI * 0.22 + (Math.random() - 0.5) * 0.15;
    wreckGroup.add(rib);
  }

  // scattered debris: crates around the hull, a fallen mast/pipe alongside
  for (let i = 0; i < 6; i++) {
    const x = centerX + (Math.random() - 0.5) * 16;
    const z = centerZ + (Math.random() - 0.5) * 10 + 2;
    const y = floorHeightAt(x, z);
    const size = 0.5 + Math.random() * 0.5;
    const crate = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), debrisMat);
    crate.position.set(x, y + size / 2, z);
    crate.rotation.y = Math.random() * Math.PI;
    crate.rotation.x = (Math.random() - 0.5) * 0.3;
    wreckGroup.add(crate);
  }

  const mastX = centerX + 4, mastZ = centerZ - 5;
  const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 9, 6), hullMat2);
  mast.position.set(mastX, floorHeightAt(mastX, mastZ) + 0.2, mastZ);
  mast.rotation.z = Math.PI / 2 + 0.2;
  mast.rotation.y = 0.9;
  wreckGroup.add(mast);

  wreckGlowLight = makeGlowMotes(centerX, centerZ, baseY);
}

// bioluminescence inside the hull — visit 5's open thread on what
// "distinguishes inside from outside" in the wreck. Motes sit along the same
// x-line as the rib arcs above, so the glow is glimpsed through the gaps in
// the plating rather than lighting the open water around the hull.
const glowColors = [0x2effc9, 0x1dd9a3, 0x35c9ff];
const glowMotes = [];
let wreckGlowLight = null;
function makeGlowMotes(centerX, centerZ, baseY) {
  const MOTE_COUNT = 14;
  for (let i = 0; i < MOTE_COUNT; i++) {
    const x = centerX - 7 + Math.random() * 6.5; // along the rib line
    const y = baseY + 1.4 + Math.random() * 1.7; // inside the hull's cross-section
    const z = centerZ + (Math.random() - 0.5) * 1.6;
    const color = glowColors[(Math.random() * glowColors.length) | 0];
    const mat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      fog: true,
    });
    const size = 0.05 + Math.random() * 0.05;
    const mote = new THREE.Mesh(new THREE.SphereGeometry(size, 6, 5), mat);
    mote.position.set(x, y, z);
    scene.add(mote);
    glowMotes.push({
      mesh: mote,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 0.5,
      baseOpacity: 0.3 + Math.random() * 0.3,
      driftPhase: Math.random() * Math.PI * 2,
    });
  }
  // a dim light glimpsed through the broken ribs, not lighting the open water
  const light = new THREE.PointLight(0x2effc9, 0.9, 6, 2);
  light.position.set(centerX - 4, baseY + 2.2, centerZ);
  scene.add(light);
  return light;
}

makeWreck(42, -34);

// ---------- marine snow: drifting particulate ----------
const PARTICLES = 2200;
const particleGeo = new THREE.BufferGeometry();
const particlePos = new Float32Array(PARTICLES * 3);
const particleSeed = new Float32Array(PARTICLES);
for (let i = 0; i < PARTICLES; i++) {
  particlePos[i * 3 + 0] = (Math.random() - 0.5) * 60;
  particlePos[i * 3 + 1] = (Math.random() - 0.5) * 40;
  particlePos[i * 3 + 2] = (Math.random() - 0.5) * 80 - 20;
  particleSeed[i] = Math.random() * 100;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xdff5f0,
  size: 0.045,
  transparent: true,
  opacity: 0.55,
  depthWrite: false,
  fog: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ---------- fish: a school that schools, and scatters when approached ----------
const fishColors = [0xb9d9d2, 0x8fc7c9, 0x6fa8ab, 0xd7e8d4];
const fishMats = fishColors.map(
  (c) =>
    new THREE.MeshStandardMaterial({ color: c, roughness: 0.7, metalness: 0.05, flatShading: true, fog: true })
);

function makeFishMesh(mat) {
  const group = new THREE.Object3D();
  const body = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.5, 5), mat);
  body.rotation.x = -Math.PI / 2; // tip points along -Z (forward)
  group.add(body);
  const tail = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.22), mat);
  tail.position.z = 0.32;
  group.userData.tail = tail;
  group.add(tail);
  return group;
}

const FISH_COUNT = 26;
const schoolHome = new THREE.Vector3(-15, 0, -48);
schoolHome.y = floorHeightAt(schoolHome.x, schoolHome.z) + 4.5;
const HOME_RADIUS = 5;
const HOME_SPRING = 0.3; // gentle, always-on pull toward home while inside the radius
const HOME_PULL_BEYOND = 1.8; // stronger correction once scattered past the radius
const PERCEPTION = 3.2;
const SEPARATION_DIST = 1.0;
const FLEE_RADIUS = 6.5;
const FISH_MAX_SPEED = 2.6;
const FISH_DRAG = 1.4; // lets velocity respond to changing forces instead of coasting/oscillating

const fish = [];
for (let i = 0; i < FISH_COUNT; i++) {
  const mat = fishMats[i % fishMats.length];
  const mesh = makeFishMesh(mat);
  const pos = schoolHome.clone().add(
    new THREE.Vector3((Math.random() - 0.5) * HOME_RADIUS, (Math.random() - 0.5) * 3, (Math.random() - 0.5) * HOME_RADIUS)
  );
  mesh.position.copy(pos);
  scene.add(mesh);
  fish.push({
    mesh,
    pos,
    vel: new THREE.Vector3((Math.random() - 0.5), 0, (Math.random() - 0.5)).setLength(0.6),
    wagPhase: Math.random() * Math.PI * 2,
    wagSpeed: 6 + Math.random() * 2,
  });
}

const _sep = new THREE.Vector3();
const _cohere = new THREE.Vector3();
const _align = new THREE.Vector3();
const _flee = new THREE.Vector3();
const _toHome = new THREE.Vector3();
const _steer = new THREE.Vector3();

function updateFish(dt, t, swimmerPos) {
  for (let i = 0; i < fish.length; i++) {
    const f = fish[i];
    _sep.set(0, 0, 0);
    _cohere.set(0, 0, 0);
    _align.set(0, 0, 0);
    let neighbors = 0;

    for (let j = 0; j < fish.length; j++) {
      if (i === j) continue;
      const o = fish[j];
      const d = f.pos.distanceTo(o.pos);
      if (d < PERCEPTION) {
        _cohere.add(o.pos);
        _align.add(o.vel);
        neighbors++;
        if (d < SEPARATION_DIST && d > 1e-4) {
          _steer.copy(f.pos).sub(o.pos).divideScalar(d * d);
          _sep.add(_steer);
        }
      }
    }

    _steer.set(0, 0, 0);
    if (neighbors > 0) {
      _cohere.divideScalar(neighbors).sub(f.pos).multiplyScalar(0.9);
      _align.divideScalar(neighbors).multiplyScalar(0.7);
      _steer.add(_cohere).add(_align);
    }
    _steer.add(_sep.multiplyScalar(2.4));

    // scatter: flee the swimmer when it's close, harder the closer it gets
    const distToSwimmer = f.pos.distanceTo(swimmerPos);
    if (distToSwimmer < FLEE_RADIUS) {
      _flee.copy(f.pos).sub(swimmerPos);
      const strength = (1 - distToSwimmer / FLEE_RADIUS) * 9;
      _flee.setLength(strength);
      _steer.add(_flee);
    }

    // always drift gently toward the home volume; pull harder once scattered past it
    _toHome.copy(schoolHome).sub(f.pos);
    const homeDist = _toHome.length();
    const homePull = homeDist > HOME_RADIUS ? (homeDist - HOME_RADIUS) * HOME_PULL_BEYOND : homeDist * HOME_SPRING;
    _toHome.setLength(homePull);
    _steer.add(_toHome);

    _steer.addScaledVector(f.vel, -FISH_DRAG);
    f.vel.addScaledVector(_steer, dt);
    if (f.vel.length() > FISH_MAX_SPEED) f.vel.setLength(FISH_MAX_SPEED);
    else if (f.vel.length() < 0.4) f.vel.setLength(0.4); // fish don't idle in place

    f.pos.addScaledVector(f.vel, dt);

    // stay clear of the floor and the surface
    const floorY = floorHeightAt(f.pos.x, f.pos.z) + 0.5;
    if (f.pos.y < floorY) f.pos.y = floorY;
    if (f.pos.y > 6) f.pos.y = 6;

    f.mesh.position.copy(f.pos);
    f.mesh.rotation.y = Math.atan2(f.vel.x, f.vel.z) + Math.PI;
    f.mesh.rotation.x = -Math.asin(Math.max(-1, Math.min(1, f.vel.y / Math.max(f.vel.length(), 0.001))));
    f.mesh.userData.tail.rotation.y = Math.sin(t * f.wagSpeed + f.wagPhase) * 0.6;
  }
}

// ---------- a shape passing in the far blue, only half-seen ----------
// visit 1 gave it a CapsuleGeometry whose long axis runs along Y (three.js's
// default) but only ever spun it on rotation.y — rotating a vertical pill
// around its own axis is invisible, so it never actually pointed anywhere.
// This visit builds a tapered fusiform body with its long axis on Z instead,
// so rotation.y (still driven by the same travel-direction math below) now
// visibly orients it, plus a dorsal fin for silhouette and a fluke that
// flaps as it swims.
const wandererMat = new THREE.MeshStandardMaterial({ color: 0x03181e, roughness: 1, fog: true });

function makeWandererBody() {
  // fusiform profile, nose to tail-stock: thick amidships, tapering to a
  // point at both ends so the lathe closes cleanly (no flat end caps)
  const profile = [
    new THREE.Vector2(0.0, -4.3),
    new THREE.Vector2(0.5, -3.7),
    new THREE.Vector2(1.0, -2.3),
    new THREE.Vector2(1.3, -0.5),
    new THREE.Vector2(1.35, 1.0),
    new THREE.Vector2(1.1, 2.4),
    new THREE.Vector2(0.6, 3.5),
    new THREE.Vector2(0.0, 4.2),
  ];
  const geo = new THREE.LatheGeometry(profile, 12);
  geo.rotateX(Math.PI / 2); // carries the lathe's Y-axis length onto Z (forward)
  return jitterGeo(geo, 0.05);
}

const wanderer = new THREE.Object3D();
const wandererBody = new THREE.Mesh(makeWandererBody(), wandererMat);
wanderer.add(wandererBody);

// dorsal fin: a flattened blade standing off the back, static — silhouette only
const dorsalGeo = new THREE.ConeGeometry(0.9, 1.7, 3);
dorsalGeo.scale(1, 1, 0.14);
const dorsal = new THREE.Mesh(dorsalGeo, wandererMat);
dorsal.position.set(0, 1.35, -0.2);
dorsal.rotation.x = Math.PI / 2 + 0.3;
wanderer.add(dorsal);

// tail fluke: two blades hinged at the tail stock, flapping vertically as it swims
const flukePivot = new THREE.Object3D();
flukePivot.position.set(0, 0, 4.15);
wanderer.add(flukePivot);
const flukeGeo = new THREE.ConeGeometry(0.85, 2.5, 3);
flukeGeo.scale(1, 0.15, 1);
const flukeL = new THREE.Mesh(flukeGeo, wandererMat);
flukeL.position.set(0.7, 0, 0.85);
flukeL.rotation.z = -0.55;
flukePivot.add(flukeL);
const flukeR = new THREE.Mesh(flukeGeo, wandererMat);
flukeR.position.set(-0.7, 0, 0.85);
flukeR.rotation.z = 0.55;
flukePivot.add(flukeR);

wanderer.position.set(-30, -3, -90);
scene.add(wanderer);
let wandererT = Math.random() * 100;
// ---------- swim controls ----------
const yaw = new THREE.Object3D();
const pitch = new THREE.Object3D();
yaw.add(pitch);
pitch.add(camera);
yaw.position.copy(camera.position);
camera.position.set(0, 0, 0);
scene.add(yaw);

let yawAngle = 0;
let pitchAngle = -0.05;
const PITCH_LIMIT = Math.PI / 2 - 0.05;

const keys = Object.create(null);
addEventListener('keydown', (e) => { keys[e.code] = true; });
addEventListener('keyup', (e) => { keys[e.code] = false; });

const velocity = new THREE.Vector3();
const accel = new THREE.Vector3();
const DRAG = 2.2;       // water resistance: higher = more sluggish
const THRUST = 5.2;     // swim force
const MAX_SPEED = 4.2;

const hud = document.getElementById('hud');
const hint = document.getElementById('hint');
const depthEl = document.getElementById('depth');
const canvasEl = renderer.domElement;

function requestLock() { canvasEl.requestPointerLock(); }
hint.addEventListener('click', requestLock);
canvasEl.addEventListener('click', () => {
  if (document.pointerLockElement !== canvasEl) requestLock();
});

document.addEventListener('pointerlockchange', () => {
  const locked = document.pointerLockElement === canvasEl;
  hud.classList.toggle('hidden', locked);
});

document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement !== canvasEl) return;
  yawAngle -= e.movementX * 0.0022;
  pitchAngle -= e.movementY * 0.0022;
  pitchAngle = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitchAngle));
});

const clock = new THREE.Clock();
const forward = new THREE.Vector3();
const right = new THREE.Vector3();
const worldUp = new THREE.Vector3(0, 1, 0);

function resize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
addEventListener('resize', resize);

function tick() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  yaw.rotation.y = yawAngle;
  pitch.rotation.x = pitchAngle;

  forward.set(0, 0, -1).applyEuler(new THREE.Euler(pitchAngle, yawAngle, 0, 'YXZ'));
  right.set(1, 0, 0).applyAxisAngle(worldUp, yawAngle);

  accel.set(0, 0, 0);
  if (keys.KeyW) accel.addScaledVector(forward, THRUST);
  if (keys.KeyS) accel.addScaledVector(forward, -THRUST);
  if (keys.KeyD) accel.addScaledVector(right, THRUST);
  if (keys.KeyA) accel.addScaledVector(right, -THRUST);
  if (keys.Space) accel.y += THRUST;
  if (keys.ShiftLeft || keys.ShiftRight || keys.KeyC) accel.y -= THRUST;

  // water drag opposes velocity — gives the lag/drift the seed asks for
  accel.addScaledVector(velocity, -DRAG);
  velocity.addScaledVector(accel, dt);
  if (velocity.length() > MAX_SPEED) velocity.setLength(MAX_SPEED);

  yaw.position.addScaledVector(velocity, dt);

  // gentle current sway, like being nudged even when still
  yaw.position.x += Math.sin(t * 0.13) * 0.0025;
  yaw.position.y += Math.sin(t * 0.21 + 1.7) * 0.0015;

  // keep the swimmer below the surface and clear of freefall into the abyss
  if (yaw.position.y > 8) yaw.position.y = 8;
  if (yaw.position.y < -20) yaw.position.y = -20;

  // subtle roll into turns for a swimming, not walking, feel
  pitch.rotation.z += ((-velocity.dot(right) * 0.05) - pitch.rotation.z) * Math.min(1, dt * 4);

  for (const s of shafts) {
    s.rotation.z = Math.sin(t * 0.15 + s.userData.sway) * 0.05;
  }

  for (const stalk of kelpStalks) {
    const { segments, phase, speed } = stalk;
    for (let i = 0; i < segments.length; i++) {
      const bend = 0.06 + (i / segments.length) * 0.16;
      segments[i].rotation.z = Math.sin(t * speed + phase + i * 0.7) * bend;
      segments[i].rotation.x = Math.sin(t * speed * 0.8 + phase + i * 0.9) * bend * 0.5;
    }
  }

  for (const s of reefSway) {
    s.mesh.rotation.z = Math.sin(t * s.speed + s.phase) * 0.18;
  }

  const pp = particleGeo.attributes.position;
  for (let i = 0; i < PARTICLES; i++) {
    const seed = particleSeed[i];
    pp.array[i * 3 + 1] += Math.sin(t * 0.3 + seed) * 0.0015 + 0.0015;
    pp.array[i * 3 + 0] += Math.sin(t * 0.2 + seed * 1.3) * 0.0008;
    if (pp.array[i * 3 + 1] > 20) pp.array[i * 3 + 1] = -20;
  }
  pp.needsUpdate = true;

  updateFish(dt, t, yaw.position);

  for (const m of glowMotes) {
    const pulse = Math.sin(t * m.speed + m.phase) * 0.5 + 0.5;
    m.mesh.material.opacity = Math.min(1, m.baseOpacity + pulse * 0.5);
    m.mesh.position.y += Math.sin(t * 0.3 + m.driftPhase) * 0.0006;
  }
  if (wreckGlowLight) {
    wreckGlowLight.intensity = 0.5 + (Math.sin(t * 0.6) * 0.5 + 0.5) * 0.6;
  }

  wandererT += dt * 0.04;
  wanderer.position.x = Math.sin(wandererT) * 40 - 10;
  wanderer.position.z = -90 + Math.cos(wandererT * 0.7) * 25;
  wanderer.rotation.y = -wandererT - Math.PI / 2;
  flukePivot.rotation.x = Math.sin(t * 1.1) * 0.35;

  depthEl.textContent = `depth ${Math.max(0, Math.round(-yaw.position.y * 3.1))} ft`;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
